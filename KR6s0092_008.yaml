body:
  text: 大唐天后敕佛授記寺沙門明佺等撰小乘重譯經目卷之一三百七十七部八百四十六卷四十二章經一卷初譯六紙右後漢明帝代永平十年迦葉摩騰共竺法蘭於白馬寺譯出長房録四十二章經一卷第二出右吳支謙譯與摩騰譯者少異四十二章經一卷第三出右見長房録上三經同本別譯十二因緣觀經一卷第三出右後秦弘始年羅什譯出長房録十二因緣經一卷與漢代安世高譯少異右西晉竺法護譯出長房録上二經同本別譯所欲致患經一卷右西晉代竺法護譯出長房録所欲致患經一卷第二出右東晉耆多蜜譯出長房録上二經同本別譯摩登女經一卷一名摩鄧女經一名阿難為蠱道女惑經三紙右後漢安世高譯出長房録摩登女解形中六事經一卷三紙右失譯出長房録上二經同本別譯罪業報應教化地獄經一卷或云地獄報應經六紙右後漢代安世高譯出長房録罪業報應經一卷寶唱録云一名罪業報應教化地獄經右東晉孝武帝代沙門曇無蘭譯出長房録上二經同本別譯阿難問事佛吉凶經一卷僧祐録云或名阿難問經四紙右後漢代安世高譯出長房録分別經一卷右西晉代竺法護譯出長房録阿難分別經一卷一名分別經又名阿難問事佛吉凶經右西秦乞伏世法堅譯出長房録弟子慢為耆域經一卷右宋孝武帝代北涼安陽侯沮渠京聲譯出長房録上四經同本別譯舍頭諫經一卷亦云舍頭諫太子明二十八宿經亦云太子明星二十八宿經亦云虎耳經右後漢代安世高譯出長房録摩登伽經一部三卷或二卷三十七紙右吳代竺律炎支謙於武昌譯出達摩鬱多羅録太子二十八宿經一卷右西晉代竺法護譯出長房録舍頭諫經一卷二十六紙一名太子二十八宿經一名虎耳太子經化度録云虎耳意第二出與摩登伽經同本異出與漢世高出者少異右西晉永嘉年竺法護譯出長房録上四經同本別譯五母子經一卷二紙右吳代支謙譯出長房録沙彌羅經一卷二紙右晉安帝代曇摩讖譯出長房録上二經同本異譯義足經一部二卷四十一紙右吳黃武年支謙譯出化度寺録義足經一部二卷右東晉孝武帝代沙門竺曇無蘭譯出長房録天神禁寶經一卷右東晉孝武帝代沙門竺曇無蘭譯出長房録鏡面王經一卷右後漢伐安世高譯出長房録鏡面王經一卷右吳赤烏年康僧會譯出長房録桀貪王經一卷右吳支謙譯出長房録𭟵辭梵志經一卷梵志疑爭得解脫經一卷兜勒梵志經一卷法觀梵志經一卷梵志觀無常得解脫經一卷猛觀梵志經一卷以前十一經並義足經出正法念處經一部七十卷一千四百一紙右後魏興和元年瞿曇般若留支於鄴城大丞相高澄第譯出長房録善時鵝王經一卷以前一經正法念經出摩調王經一卷右吳支謙譯出長房録摩調王經一卷事同中阿含大天經出第八卷右東晉沙門祇多蜜譯出長房録上二經同本別譯十善十惡經一卷一名分別善惡經右西晉惠帝代永寧年支法度譯出長房録十善十惡經一卷第二譯右東晉孝武帝代竺曇無蘭於楊州謝鎮西寺譯出長房録上二經同本別譯五百梵志經一卷右宋孝武代北涼安陽侯沮渠京聲譯出長房録梵志經一卷與五百梵志經同本異譯右寶唱録云竺律頭炎誦出之出始興録上二經同本別譯小本起經一部二卷或云修行本起經或云修行經右後漢靈帝代支曜於洛陽譯出長房録修行本起經一部二卷三十八紙寶唱録云一名宿行本起右後漢竺曇果康孟詳共譯出內典録太子本起瑞應經一部二卷初出亦云瑞應本起亦名中本起經右後漢外國沙門康孟詳譯出長房録中本起經一部二卷或云太子中本起經右後漢建安十二年竺曇果譯出長房録大子本起瑞應經一部二卷三十五紙一名瑞應本起經第二出與康孟詳出者小異右吳建興年支謙於金陵譯出內典録過去因果經一部四卷右晉安帝世佛馱跋陀羅於楊都譯出長房録過去現在因果經一部四卷九十六紙右宋元嘉年求那跋陀羅譯出內典録上七經同本別譯雜藏經一卷九紙與鬼問目連餓鬼報應目連説地獄餓鬼因緣等四本同體異名別譯見寶唱録右東晉佛馱跋陀羅共法顯於楊都譯出長房録雜藏經一卷右宋文帝代求那跋陀羅譯出長房録鬼問目連經一卷四紙右後漢代安世高譯出長房録餓鬼報應經一卷一名目連説地獄餓鬼因緣經上四經同本別譯興起行經一部二卷一名十緣經三十六紙右後漢獻帝代沙門康孟詳譯出長房録木槍刺腳因緣經一卷出興起行經上二經同本別譯奈女耆域經一卷右後漢代安世高譯出長房録奈女耆域經一卷十七紙或云奈女經右西晉竺法護譯出內典録上二經同本別譯貧窮老公經一卷三紙一名貧老經右西晉法炬法立譯出達摩鬱多羅録貧窮老公經一卷右宋孝武帝代沙門慧簡於鹿野寺譯出長房録上二經同本別譯越難經一卷二紙一名難經第二出寶唱録云曰難長者經右西晉清信士聶承遠譯出長房録曰難經一卷一名越難右東晉釋嵩公譯出長房録曰難經一卷一云越難經右宋文帝元嘉年求那跋陀羅譯上三經同本別譯七女經一卷六紙一名七女本經長房云出阿毗曇右吳黃武年支謙譯出長房録七女本經一卷右西晉竺法護譯出長房録七女本經一卷與支謙出者大同小異亦名女本心明經亦名七女經右西晉聖堅於河南國譯出長房録上三經同本別譯龍王兄弟經一卷三紙一名難龍王經右吳支謙譯出長房録目連降龍王經一卷右宋文帝代元嘉年求那跋陀羅譯出長房録上二經同本別譯禪思滿足經一卷右後漢代安世高譯出長房録禪思滿足經一卷右東晉孝武帝代西域沙門竺曇無蘭譯出長房録上二經同本別譯勸進學道經一卷一本