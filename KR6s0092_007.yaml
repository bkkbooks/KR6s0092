body:
  text: 大唐天后敕佛授記寺沙門明佺等撰小乘單譯經目三百二十八部四百二十四卷佛本生經一卷右漢明帝代三藏法師竺法蘭譯出長房録禪經一部二卷右漢桓帝代安世高譯出長房録佛為阿支羅迦葉說自他作苦經一卷右後漢代安世高譯出長房録安般經一卷右後漢代安世高譯出長房録五門禪要用法經一卷初出右後漢代安世高譯出長房録浮木譬喻經一卷右後漢代安世高譯出長房録摩訶衍精進度中罪報品經一卷右後漢代安世高譯出長房録八大人覺經一卷二紙右後漢代安世高譯出寶唱録悔過法經一卷右後漢代安世高譯出長房録五法經一卷右後漢代安世高譯出長房録五行經一卷右後漢代安世高譯出長房録三毒經一卷右後漢代安世高譯出長房録住陰持入經一卷或二卷或云陰持入經右後漢代安世高譯出長房録正齊經一卷右後漢代安世高譯出長房録佛說處處經一卷十五紙右後漢代安世高譯出長房録情離有罪經一卷右後漢代安世高譯出長房録出家緣經一卷二紙一云出家因緣經右後漢代安世高譯出長房録阿含正行經一卷四紙一名佛說正意經右後漢代安世高譯出長房録十八泥犁經一卷五紙或云十八地獄經右後漢代安世高譯出長房録法受塵經一卷二紙右後漢代安世高譯出內典及長房録禪行法想經一卷二紙右後漢代安世高譯出內典及長房録佛說三毒事經一卷右後漢安世高譯出長房録分明罪福經一卷右後漢安世高譯出長房録陰持入經一部二卷三十二紙右後漢安世高譯出長房録大安般守意經一部二卷或一卷四十五紙右後漢代安世高譯出長房録大安般經一部二卷或一卷二十紙右後漢代安世高譯出內典録難提迦羅越經一卷右後漢代安世高譯出長房録思惟經一卷一名思惟要略經右後漢代安世高譯出長房録阿毗曇苦慧經一卷一名毗曇五法行經右後漢代安世高譯出寶唱録禪定方便次第法經一卷右後漢代安世高譯出長房録數息事經一卷右後漢代安世高譯出長房録禪法經一卷右後漢代安世高譯出長房録堅意經一卷或二卷一名堅心正意經一名堅心經右後漢代安世高譯出長房録長者子懊惱三處經一卷四紙亦名長者懊惱經亦直云三處惱經右後漢代安世高譯出長房録揵陀國王經一卷二紙右後漢代安世高譯出長房録禪經一卷右漢靈帝代支婁迦讖譯出長房録阿闍世王問五逆經一卷一名阿闍世王經右後漢代沙門支讖譯出化度寺録斷十二因緣經一卷亦云阿含口解十二因緣經亦云阿含口解經亦云安侯口解經右後漢靈帝代都安玄譯出長房録首至問佛十四事經一卷右漢靈帝中平年支曜於洛陽譯出長房録墮落優婆塞經一卷右後漢沙門支曜於洛陽譯出長房録小道地經一卷右後漢靈帝代支曜於洛陽譯出長房録報福經一卷或云福報經右後漢獻帝代外國沙門康孟詳於洛陽譯出長房録七漏經一卷右魏文帝代吳支謙譯出長房録黑氏梵志經一卷二紙右魏文帝代吳支謙譯出長房録修行方便經一部二卷一名修行方便禪經右吳支謙譯出長房録悔過法經一卷一云敘十方禮拜悔過文或無經字直云悔過法右吳支謙譯出長房録賢者德經一卷右吳支謙譯出長房録難龍王經一卷一云難龍經右吳代支謙譯出長房録梵志結淨經一卷右吳代支謙譯出長房録恆水戒經一卷右吳代支謙譯出長房録惟日雜難經一卷右吳代支謙譯出長房録佛為訶到曠野鬼說法經一卷右吳代支謙譯出長房録須摩提長者經一卷九紙右吳代支謙譯出長房録阿難四事經一卷三紙右吳代黃武年支謙譯出內典録佛醫經一卷右吳代竺律頭炎共支謙於楊都譯出內典録阿質國王經一卷右吳代支謙譯出長房録惟婁王師子湩譬喻經一卷一本無譬喻字右吳代支謙譯出長房録外道仙尼說度經一卷右吳代支謙譯出長房録未生怨王經一卷三紙右吳代支謙譯出長房録三品弟子經一卷三紙一名弟子學有三輩經或無有字右吳代支謙譯出長房録四願經一卷二紙右吳代黃武年支謙譯出內典及長房録度梵志經一卷右吳代支謙譯出長房録佛為外道須深說離欲經一卷右吳代支謙譯出長房録弊魔試目連經一卷出阿毗曇右魏文帝代吳支謙譯出長房録藍達王經一卷亦云目連因緣功德經亦云目連功德經見吳録右魏文帝代吳支謙譯出長房録百喻經一卷右魏文帝代吳支謙譯出長房録坐禪經一卷右魏齊王代吳正始年中康僧會譯出長房録菩薩二百五十法經一卷右魏齊王代吳正始年中康僧會譯出長房録諸神呪經一部三卷右西晉代竺法護於洛陽譯出長房録寶藏經一部二卷太始六年出右西晉竺法護譯出長房録當來變經一卷右西晉竺法護譯出長房録佛為菩薩五夢經一卷第二譯一名佛五夢經一名太子五夢經一名仙人五夢經右西晉太安二年竺法護譯見舊録及道真録摩目揵連本經一卷一本有訶無揵字右西晉竺法護譯出長房録五蓋疑結失行經一卷右西晉永明二年竺法護譯出長房録五福施經一卷右西晉代竺法護譯出長房録三品悔過經一卷右西晉竺法護譯出長房録觀行不移四事經一卷右西晉代竺法護譯出長房録四婦喻經一卷右西晉代竺法護譯出長房録廅羅王經一卷右西晉代竺法護譯出長房録檀若經一卷右西晉代竺法護譯出長房録龍施經一卷右西晉代竺法護譯出長房録給孤獨明德經一卷亦名給孤獨氏經右西晉代竺法護譯出長房録龍王兄弟陀達誡王經一卷右西晉代竺法護譯出長房録勸化王經一卷右西晉代竺法護譯出長房録解無常經一卷右西晉代竺法護譯出長房録雁王五百雁俱經一卷右