body:
  text: 大唐天后敕佛授記寺沙門明佺等撰大小乘失譯經目一卷四百二十四部六百三十六卷右失譯經者興廢遞更經全失主故今編之貽諸後代大乘居先小乘於後大乘失譯經佛名經一部三卷佛名經一部十卷現在千佛名一卷過去千佛名一卷當來星宿劫千佛名一卷同號佛名一卷請金剛呪經一卷金剛隨意所樂一切皆呪經一卷金剛如所願一切勝呪經一卷金剛結界呪經一卷金剛小心除滅諸怨呪經一卷金剛請夢呪經一卷思益呪經一卷十方佛神呪經一卷菩薩善戒比尼藏經一卷佛説菩薩戒經一卷日出經一卷雜要經一卷一名菩薩要行經降怨王所行檀波羅蜜經一卷佛説分別觀經一卷法門念佛三昧經一卷集法悅捨苦陀羅尼經一卷諸天王所説陀羅尼經一卷金剛十二使呪經一卷血氣神呪經一卷一云取血氣經菩薩名一部二卷六菩薩名亦當誦持經一卷九十五種道雜類神呪經一部二卷佛説六字大陀羅尼呪經一卷六字神呪經一卷摩尼羅神呪經一卷呪土經一卷善法方便陀羅尼經一卷七紙金剛祕密善門陀羅尼經一卷五紙師子奮迅菩薩所問經一卷二紙華聚陀羅尼經一卷三紙善信神呪經一部二卷五方龍王神呪經一卷佛説諸大地獄果報經一卷八吉祥神呪經一卷文殊師利受記經一卷出寶唱録師子步雲音菩薩問文殊師利成佛時事經一卷出寶唱録師子步雷音菩薩問文殊師利慈經一卷文殊發願經一卷度世品經一部六卷如來祕密藏經一部二卷一名大方廣如來性起微密藏經亦名如來性起經方等陀羅尼經一卷寶嚴經一卷五福德經一卷亦直云五福經明相續解脫地波羅蜜經一卷弟子學有三輩經一卷或云三品弟子經右七部合一十三卷吳別三録並直單注元康年中出不顯譯人詳覽群録未見指的所以別件猶殊失譯遺教三昧經一部二卷或云遺教三昧法律經未曾有因緣經一部二卷或云未曾有經觀世音成佛經一卷出寶唱録觀世音三昧經一卷出寶唱録賢劫千佛名一卷十方佛名經一卷三千佛名經一卷南方佛名經一卷一名治成寺經菩薩投身餓虎起塔因緣經一卷七紙出僧祐録跋陀悔過經一卷阿惟越致菩薩戒經一卷阿惟越致轉經一部一十八卷人弘法經一卷僧祐録菩薩本願經一卷寶唱録彌勒先身經一卷寶唱録菩薩懺悔經一卷寶唱録如來神力經一卷寶唱録觀世音求十方佛各為受記經一卷寶唱録龍施菩薩本起經一卷四紙出寶唱録曇昧摩提菩薩經一卷諸經佛名二卷受持佛名不墮惡趣經一卷惟日雜難經一卷幻師陂陀呪經一卷呪賊呪法一卷七佛安宅神呪經一卷安宅神呪經一卷呪眼痛經一卷五龍呪毒經一卷呪齲齒經一卷一名呪蟲齒一云呪齒梵天王請佛千首經一部二卷右出長房録普賢菩薩答難二千經一部二卷右出長房録大總持神呪經一卷一名總持呪經甚深大回向經一卷五紙僧祐録十吉祥經一卷二紙寶唱録阿那含經一部二卷那先比丘經一部二卷或三卷觀無量壽佛經一卷三世三千佛名經一卷千佛因緣經一卷五十三佛名經一卷八部佛名經一卷十方佛名經一卷南方佛名經一卷滅罪得福佛名經一卷一切智光仙人慈心不食肉經一卷寶唱録分別功德經一部五卷胡本經一部四卷泥洹後千歲中變記經一部四卷或云千歲變經合道神足經一部四卷一名道神足無極變化經雜譬喻經一部二卷佛見牧牛者示道經一卷作佛形像經一卷一名優填王作形像經一名作像因緣經五十三佛名經一卷八部佛名經一卷滅罪得福佛名經一卷觀世音所説行法經一卷一名是呪經寂調意所問經一卷一名如來所説清淨調伏經薩陀波崙菩薩求深般若塗像經一卷菩薩生地經一卷菩薩所生地經一卷菩薩受戒法經一卷受菩薩戒次第十法一卷菩薩懺悔法一卷初發意菩薩常晝夜六時行五事一卷六菩薩名一卷四天王經一卷後有呪似後人所附出雜阿含頂生王因緣生經一卷舊録云頂生王經行檀波羅蜜經一卷或名一切施王所行檀波羅蜜經功德莊嚴王八萬四千歲請佛經一卷魔調王經一卷教子經一卷一名須達教子經舊録云須達訓子經寶唱録云孝子報恩經王宗録云孝子經菩薩修行經一卷一名長者威施所問菩薩修行經或云長者修行經長者賢首經一卷長者命終無子付囑經一卷善德婆羅門求舍利經一卷無害梵志執志經一卷鐵城泥梨經一卷持齋經一卷海八德經一卷寂志果經一卷舊雜譬喻經一部二卷華嚴瓔珞經一卷觀世樓炭經一卷金剛清淨經一卷或云金剛三昧本性清淨不壞不滅經十住毗婆沙經一卷轉女身菩薩經一卷一名樂瓔珞莊嚴女經一名樂瓔珞莊嚴三昧經七寶經一卷沙門為十二頭陀經一卷須河譬經一卷法句譬喻經一卷胡音偈本經一卷五言詠頌本起經一卷一百四十二首道行品諸經梵音解一卷七佛所結麻油述呪一卷已上漢時失譯摩訶乘經一部十四卷摩訶衍優波提舍經一部五卷三昧王經一卷一退轉輪經一部四卷佛從兜率降中陰經一部四卷四天王經一部四卷度無極譬經一部四卷或三卷釋提桓因所問經一部三卷大梵天王請轉法輪經一部三卷法華光瑞菩薩見受經一部三卷太子試藝本起經一部二卷小本起經一部二卷大梵天王經一部二卷深斷連經一部二卷菩薩常行經一卷阿難得道經一卷阿難般泥洹經一卷沙門分衛見怪異經一卷弟子本行經一卷魔試佛經一卷阿須倫問八事經一卷舊録云阿須倫所問經摩竭王經一卷舊録云摩竭國王經年少王經一卷太子法慧經一卷是光太子經一卷長者難提經一卷長者子誓經一卷五百婆羅門問有無經一卷女利行經一卷四婦因緣經一卷淫人曳踵行經一卷墮迦經一卷見舊録晉言堅強牛米自供養經一卷舊録無養字行牧食牛經一卷壁四經一卷無端底持經一卷舊録云無端底總持經失道得道經一卷心情心識經一卷撿意向正經一卷道德果證經一卷螢火六度經一卷一云螢火明度經小觀世婁歎經一卷大四諦經一卷五方便經一卷五惟越羅名解説經一卷中五濁世經一卷六波羅蜜經一卷大七車經一卷八輩經一卷大十二因緣經一卷逮慧三昧經一卷見舊録一名文殊師利問十一行經小安般舟三昧經一卷禪行斂意經一卷舊録云禪行撿意經群生偈經一卷薩和菩薩經一卷舊録云國王薩和菩薩經大忍辱經一部十卷不退轉經一部四卷一名不退轉法輪經金剛三昧經一卷金輪王經一卷賢劫五百佛名一卷右五部一十七卷北梁代失譯羅提低王經一卷或作國王羅提𭏬王經僧祐録七婦經一卷寶唱録身士國王所問治國經一卷龍種尊佛國變化經一卷四事解脫經一卷四事解脫度人經一卷定慧普遍國事神通菩薩經一卷舊録云定慧普遍神通菩薩密迹力士經一部二卷無明羅剎喻集經一部二卷大悲觀世音經一卷薩羅經一卷內三十七品經一卷七佛經一部四卷三昧王三昧經一卷百菩薩四弘誓經一卷菩薩宿緣經一卷十佛因緣經一卷般若得經一卷長房録等入法嚴經一卷亦直云法嚴經右長房録解日溢經一卷思十二因緣經一卷十二因緣阿含口解經一卷十二品生死經一卷彌勒下觀世音施珍寶經一卷寶唱録拔陂菩薩經一卷一名拔波菩薩經寶唱録三蔓提菩薩經一卷寶唱録齎花菩薩經一卷寶唱録菩薩三法經一卷寶唱録六菩薩亦當誦持經一卷寶唱録無量法門經一卷寶唱録滅罪得福經一卷寶唱録救病苦厄經一卷一名救病苦又別譯護身命經出寶唱録三乘無當因時而感經一卷寶唱録雜抄經一卷寶唱録方等倫抄一卷寶唱録龍樹讚佛經一卷寶唱録莊嚴王經一卷寶唱録阿羅訶調國王經一卷寶唱録逝童子經一卷寶唱録栴檀樹經一卷寶唱録三慧經一卷寶唱録婆羅門問經一卷寶唱録兜調婆羅門經一卷寶唱録外道問佛經一卷寶唱録小泥洹經一卷寶唱録禪數雜事一部三卷寶唱録寶鬘經一卷寶唱録密迹金剛力士經一部二卷三十六紙出內典録阿彌陀鼓音聲陀羅尼經一卷四紙出真寂寺録已下小乘失譯僧名數事行一卷摩訶僧祇律比丘要集一卷一名摩訶僧祇部比丘隨用要集法優波離問佛經一卷沙彌威儀一卷沙彌十戒經一卷舊録云沙彌戒比丘尼十戒經一卷受十善戒經一卷賢者五戒經一卷優婆塞威儀經一卷比丘諸禁律經一卷或無經字七佛所結麻油述呪經一卷出異本七佛神呪經一卷有結縷法出異本陀羅尼章句經一卷摩尼羅亶神王呪按摩經一卷三歸五戒神王名一卷右十八經晉下胡本經一部四卷薩惒薩王經一卷阿多三昧經一卷或作阿陀阿賢王經一卷颰陀悔過經一卷沙彌羅經一卷方等決經一卷比丘二事經一卷右八部合一十一卷並是西秦失譯禪要經呵欲品一卷外道誘質多長者經一卷讚七佛偈經一卷鑄金像經一卷未曾有經一卷三紙庾伽三摩斯經一卷譯言修行略一名達摩多羅禪法或云達摩多羅菩薩撰禪法要集十一因緣章經一卷禪要經呵欲品一卷內身觀章經一卷迦葉赴佛涅槃經一卷一名佛般涅槃迦葉赴佛經二紙泥犁經一卷十五紙一名勤苦泥犁經惟流王經一卷生聞婆羅門經一卷一名生聞梵志經護淨經一卷二紙木梙子經一卷二紙度世護身經一卷地獄經一卷梵志喪女經一卷二紙那先譬喻經一部四卷普達王經一卷四紙羅尼壽經一卷三紙維藍經一卷佛説恆河譬經一卷群牛偈經一卷治禪鬼魅不安經一卷道德章一卷本起鈔一卷變化本起經一卷三界人天身量及壽經一卷佛説諸天經一卷一名天地像經受食思惟經一卷略説禪經要句一卷禪經偈一卷略述毗婆沙所問釋種因緣經一卷身相經一卷明識諦觀經一卷陰持入解一卷佛誡諸比丘言我以天眼視天下人生死好醜尊者卑者經一卷四身經一卷五濁經一卷優波斯那優婆夷經一卷五龍悔過經一卷一名空惠悔過經國王十夢經一卷三紙最妙勝定經一卷相國阿羅呵經一卷盧志長者經一卷十六紙五王經一卷五紙優婆夷淨行經一部二卷四十紙旃檀越國王經一卷三紙錫杖經一卷三紙無上處經一卷一紙摩訶揵陀經一卷一名盡比丘經僧護因緣經一卷二十紙或無因緣字佛入涅槃密迹金剛力士哀戀經一卷七紙受十善戒經一卷入總持經一卷八正八邪經一卷父子因緣經一卷止寺中經一卷十八難經一卷百八愛經一卷安般行道經一卷內禪波羅蜜經一卷摩訶目揵連與佛捔能經一卷為壽盡天子説法經一卷名盡天子經須多羅入胎經一卷解慧微妙經一卷墮釋迦牧牛經一卷阿秋那三昧經一卷一名阿秋那經阿那律念復生經一卷禪數經一卷佛説五陰經一卷貧女人經一卷蜀普曜經一部八卷摩訶演經一部十四卷梵王請問經一部五卷凡人三事愚不足經一卷恆水不説戒經一卷僧祐録波羅提木叉一卷僧祐録賢者雜事經一卷僧祐録瞻波國佛説戒經一卷僧祐録沙彌離威儀經一卷僧祐録五部威儀服飾經一卷僧祐録目連問經一卷二十七紙僧祐録優多羅經一卷一名優多羅母經佛治意經一卷佛治身經一卷一名治身調達經一卷難等各第一經一卷一名阿難迦葉舍利弗説各第一經二十八天經一卷寶唱録十六無漏心經一卷寶唱録旨解經一卷寶唱録大迦葉本經一卷寶唱録佛滅度後棺𣫍葬送經一卷四紙一名比丘師經寶唱録頞多和多耆經一卷二紙寶唱録鬼子母經一卷寶唱録優波斯那優婆夷經一卷寶唱録滅怪經一卷寶唱録迦旃延説法沒盡偈經一卷寶唱録五紙阿難受持經一卷亦名雜問喻事經寶唱録迦丁比丘説當來變經一卷寶唱録八方萬物無常經一卷寶唱録六衰事經一卷寶唱録三歸五戒慈心厭離功德經一卷寶唱録一紙迦旃延偈經一卷一名迦旃延説法盡偈一百二十章寶唱録五濁世本經一卷寶唱録五大濁經一卷寶唱録二十七品經一卷寶唱録四百三昧經一卷寶唱録地獄受苦事經一卷寶唱録七佛陀羅尼經一卷寶唱録諸天經一卷一名諸天事經怛和尼百句經一卷雜數經一部二十卷便賢者悅經一卷佛從兜率降中陰經一部四卷魔試佛經一卷太子試藝本起經一部二卷大梵天王請轉法輪經一部三卷釋提桓因所問經一部三卷法華光瑞菩薩現壽經一部三卷深斷連經一部二卷庾伽三摩斯那經一卷長房録十一因緣章經一卷那先譬喻經一部四卷薩波達王經一卷雜數經一部二十卷三方便經一卷雜譬喻經一部二卷一名菩薩度人經二十六紙楞伽阿跋多羅寶一切佛語斷肉章經一卷出楞伽經斷肉品善德婆羅門求舍利經一卷沙彌守戒自殺經一卷鳥聞法生天經一卷鸚鵡聞四諦經一卷五百雁聞佛法生天經一卷堅誓師子經一卷餓鬼報應經一卷五紙一名目連説地獄餓鬼因緣經目連説餓鬼因緣一卷輪轉五道罪福報應經一卷二紙定意三昧經一卷右天册萬歲元年十月二十四日得翻經大德佛授記寺主昌平縣開國公德感及翻經大德弘景等牒稱奉敕僧德感等所奏涅槃經茶毗後分二卷佛頂尊勝陀羅尼經一卷占察經兩卷陀羅尼集經十二卷等或於他國翻來或於內外道場譯出諸如此類未為經聞奏宣行多無目録者宜付定經目録僧等子細類會若是真經即宜編入目録者定經目僧等準敕類會並是實經編入録訖
