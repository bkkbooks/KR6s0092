body:
  text: 大唐天后敕佛授記寺沙門明佺等撰小乘修多羅藏二百七部四百四十三卷四十四帙單譯經陰持入經一部二卷大安般守意經一部二卷或一卷大安般經一卷八大人覺經出家緣經一云出家因緣經阿含正行經一名佛説正意經十八泥犁經法受塵經禪行法想經佛説處處經右七經同卷堅意經一名堅心正意經一名堅心經長者子懊惱三處經亦云長者懊惱經亦直云三處惱經揵陀國王經須摩提長者經阿難四事經未生怨經三品弟子經一名弟子學有三輩經或無有字四願經右八經同卷胞胎經一卷一名胞胎受身經五百弟子自説本緣經一卷化度録云五百弟子自説本起經右陰持入等二十經九卷同帙四輩經大迦葉本經寶唱録無大字當來變經或云當來變滅經清淨法行經右四經同卷過去佛分衛經時非時經一名時經羅云忍辱經一名忍辱經佛為年少比丘説正事經難提釋經右五經同卷沙曷比丘功德經救護身命濟人病苦厄經右二經同卷五苦章句經一卷又名五苦經一云淨除罪蓋經娛樂佛法經一名五道章句經般泥洹時大迦葉赴佛經或云摩訶迦葉經大魚事經見正經一名生死變識經阿難七夢經一名阿難八夢經或無八字呵雕阿那含經一名荷雕阿那含經一名阿調阿那含經右六經同卷達摩多羅禪經一部二卷一名不淨觀經一名道地經栴檀樹經燈指因緣經佛臨般涅槃略説教誡經一名遺教經婦人遇辜經一名婦遇對經右五經同卷辨意長者子問經一名長者問意經淨飯王般涅槃經右二經同卷無垢優婆夷問經四天王經十二頭陀經一名沙門頭陀經摩訶迦葉度貧母經十二品生死經樹提伽經四品學法經右七經同卷右四輩等三十二經十卷同帙本事經一部七卷諫王經亦名大小諫王經高王觀世音經法常住經右三經同卷那先比丘經一部二卷或一卷五無返復經一名五有反覆大義經佛大僧大經耶祇經末羅王經摩達國王經五恐怖世經旃陀越經懈怠耕者經舊録云懈怠耕兒經右八經同卷右本事等一十三經十一卷同帙重譯經正法念處經一部七十卷雜寶藏經一部八卷或十卷或十三卷毗耶娑問經一部二卷右二經十卷同帙出曜經一部十九卷有衆生三世作惡經一卷右二經二十卷二帙賢愚經一部十二卷或十六卷或十七卷或十五卷起世因本經一部十卷一云起世經雜阿含經一部五十卷修行道地經一部七卷或六卷七處三觀經一卷或二卷九橫經八正道經五陰譬喻經一名水沫所漂經轉法輪經禪行三十七品經獨富長者經馬有八態經一名馬有八弊惡態經或云馬有八態譬人經馬有三相經右八經同卷不自守意經一名自守經一名自守意經聖法印經波斯匿王祖母命終經比丘避女惡名欲自殺經戒相應法經一名戒相應經戒德香經一名戒德經比丘聽施經一名聽施比丘經右七經同卷雜阿含經一卷右修行道地等一十八經十一卷同帙增一阿含經一部五十卷內典或五十一卷長房入藏録四十二卷經長阿含經一部二十二卷長房入藏録云二十五卷一十八經別中阿含經一部六十卷或五十八卷生經一部五卷或四卷寶唱云論生經四諦經是法非法經一切流攝守因緣經一名流攝經一名一切流攝守經吳録云流攝守因經一名受因經右三經同卷漏分布經十支居士八城人經本相倚致經吳録云大相倚致經緣本致經阿那律八念經一名禪行斂意經或云直八念經右五經同卷賴吒和羅經一云羅漢賴吒和羅經梵摩喻經右二經同卷齋經一名八關齋經一名優婆夷墮舍迦經申日經釋摩男本經一名五陰因事經諸法本經孫多耶致經一名梵志孫多耶致經七知經或云七智經右六經同卷恆水喻經一名海有八德經一名瞻波比丘經一名法海經長房録云恆河喻經比丘問佛多優婆塞命終經佛説求欲經新歲經右四經同卷右生經等二十一經十卷同帙頂生王故事經一名文陀竭王經一名頂生王經泥梨經右二經同卷蓱沙王五願經一名弗迦沙王經鸚鵡經一名兜調經瞿曇彌記果經右三經同卷鹹水喻經僧祐録安公出中阿含舊録云鹹水譬經出阿含經閻羅王五天使者經一名鐵城泥梨經右二經同卷古來世時經長壽王經右二經同卷魔嬈亂經一卷一名弊魔試目連經一名魔王入目揵蘭腹經梵志阿跋經一卷一名阿跋摩納經一名佛開解阿跋梵志經普法義經一卷亦云普義經亦云具法行經十報法經一部二卷一名多增道章經右頂生王等十三經九卷同帙樓炭經一部六卷或五卷或八卷迦羅越六向拜經一卷一名六向拜一名大六向拜經一名威花長者六向拜七佛父母姓字經一名婦人無匹請佛經一名七佛姓字經阿難同學經阿那邠坻化七子經三摩竭經一名須摩提女經一名難國王經一名恕和檀王經寶唱録云三摩偈經右四經同卷力士移山經一名移山經四未曾有法經琉璃王經鴦崛髻經一名指鬘經增一阿含經右五經同卷群牛譬經行七行現報經施食獲五福報經一名福德經一名施色力經國王不梨先尼十夢經一名國王七夢經放牛經右五經同卷右樓炭等十六經十卷同帙梵網六十二見經一卷一名梵網經大般涅槃經一部二卷大般泥洹經一部二卷般泥洹經一卷寂志果經一卷長者子六過出家經大愛道般涅槃經須達經一名長者須達經一名三歸五戒慈心厭得經右三經同卷右八經八卷同帙別譯雜阿含經一部二十卷坐禪三昧經一部三卷或二卷玉耶經一名長者詣佛説子婦無敬一名七婦經阿遬達經盂蘭盆經右別本五紙云淨土盂蘭經未知所出四自侵經灌蠟經一名般泥洹後四輩灌蠟經報恩奉盆經右六經同卷阿蘭若習禪法經二卷或無經字罪福報應經一卷一名分別報應經業報差別經一卷摩登女經一名摩鄧女經一名阿難為蠱道女惑經摩登女解形中六事經阿難分別經一名分別經一名阿難問事佛吉凶經五母子經沙彌羅經右五經同卷罪業報應教化地獄經一卷或云地獄報應經阿難問事佛吉凶經一卷僧祐録云或名阿難問經右坐禪等十七經十一卷同帙摩登伽經一部三卷或二卷舍頭諫經一卷一名太子二十八宿經一名虎耳太子化度録云虎耳意經第二出與摩登伽經同本異出與漢世高出者少異義足經一部二卷修行本起經一部二卷寶唱録云一名宿行本起經太子本起瑞應經一部二卷初出亦云瑞應本起經亦云中本起經右五經十卷同帙中本起經一部二卷或云太子中本起經過去現在因果經一部四卷雜藏經與鬼問目連餓鬼報應目連説地獄餓鬼因緣等四本同體異名別譯見寶唱録鬼問目連經餓鬼報應經一名目連説地獄餓鬼因緣經右三經同卷興起行經一部二卷一名十緣經奈女耆域經一卷或云奈女經貧窮老公經一名貧老經越難經一名難經第二出寶唱録云曰難長者經七女經一名七女本經長房録云出阿毗曇龍王兄弟經一名難陀龍王經八師經四十二章經所欲致患經右七經同卷右中本起等十四經十一卷同帙優婆夷淨行經一部二卷僧護因緣經一卷或無因緣佛入涅槃密迹金剛力士哀戀經一卷佛滅度後棺斂葬送經一名比丘師經一名師比丘經頞多和多耆經迦旃延説法沒盡偈經輪轉五道罪福報應經右四經同卷作佛形像經一名優填王作佛形像經一名作像因緣經十二因緣阿含口解經右二經同卷未曾有經護淨經木槵子經普達王經盧志長者經右五經同卷五王經旃檀越國王經錫杖經無上處經右四經同卷右淨行等十八經八卷同帙小乘毗尼藏三十五部二百六十卷二十八帙十誦律一部六十一卷四分律一部四十卷或七十卷或六十卷摩訶僧祇律一部四十卷彌沙塞五分律一部三十四卷善見毗婆沙律一部十八卷鼻奈耶律一部十卷一名戒因緣經大愛道比丘尼經一部二卷解脫戒本一卷出迦葉毗律十誦比丘戒本一卷十誦比丘尼戒本一卷僧祇戒本一卷僧祇大比丘戒本一卷僧祇比丘尼戒本一卷四分比丘僧戒本一卷四分比丘尼戒本一卷右九經十卷同帙大比丘三千威儀經一部三卷戒消災經一卷或云戒伏消災彌沙塞比丘戒本一卷或云五分戒本大沙門百一羯磨一卷十誦僧尼要事羯磨一部二卷曇無德羯磨一卷四分羯磨一卷右七經十卷同帙優波離問佛經一卷或云優波離律真偽沙門經一卷一名摩訶比丘經迦葉禁戒經一卷一名摩訶比丘經一名真偽沙門經沙彌十戒并威儀一卷沙彌離戒經一卷舍利弗問經一卷律二十二明了論一卷亦直云明了論沙彌威儀經一卷優婆塞五戒相一卷優婆塞五戒威儀經一卷右十經論等十卷同帙毗尼母論一部八卷薩婆多摩得勒伽一部十卷薩婆多毗尼毗婆沙一部九卷小乘阿毗達摩藏三十六部七百四十四卷七十三帙大毗婆沙論一部二百卷順正理論一部八十卷阿毗曇八揵度毗婆沙一部八十四卷或一百九卷或六十卷顯宗論一部四十卷發智論一部二十卷阿毗達磨俱舍論一部三十卷俱舍論頌一卷尊婆須蜜所集論一部十二卷或十卷鞞婆沙阿毗曇論一部十九卷或十五卷或十四卷或云毗婆沙亦云廣説阿毗曇八揵度一部三十卷或二十卷一名迦旃延阿毗曇八揵度舍利弗阿毗曇一部三十卷或二十卷或二十二卷成實論一部二十四卷或二十卷或十六卷或十四卷法勝阿毗曇論一部六卷右三論四十一卷四帙雜阿毗曇心一部十一卷分別功德論一部五卷或四卷或三卷三法度論一部三卷或二卷阿毗曇甘露味一部二卷或云甘露味阿毗曇右三論十卷同帙衆事分阿毗曇論一部十二卷解脫道論一部十三卷或十二卷四諦論一部四卷隨相論一部二卷或云求那摩諦隨相論入阿毗達磨論一部二卷異部宗輪論一卷十八部論部異執論一名執部異論右二論同卷右六論十卷同帙立世阿毗曇論一部十卷俱舍釋論一部二十二卷集異門足論一部二十卷法蘊足論一部十二卷識身足論一部十六卷阿毗曇心一部四卷右二論二十卷二帙品類足論一部十八卷阿毗達磨五事論一部二卷右二論二十卷二帙界身足論一部三卷三彌底論一部三卷辟支佛因緣論一部二卷右三論八卷同帙賢聖集傳二十一部四十一卷四帙佛所行讚傳一部五卷馬鳴菩薩造阿育王傳一部五卷或七卷右二傳十卷同帙禪祕要經一部四卷亦名禪祕要無經字禪祕要經一部五卷一名禪法要或為二卷禪法要解一部二卷治禪病祕要一卷右四經十二卷同帙百喻集一部二卷菩薩本緣集一部三卷僧伽斯那撰或四卷龍樹菩薩為禪陀迦王説要偈勸發諸王要偈請賓頭盧法賓頭盧為王説法西域抄集賓頭盧突羅闍為優陀延王説法右四經同卷馬鳴菩薩傳龍樹菩薩傳提婆菩薩傳婆藪盤豆傳右四傳同卷四阿含暮抄一部二卷右百喻等十一經九卷同帙大阿羅漢難陀蜜多法住記一卷法句集一部二卷僧伽羅剎集經一部三卷付法藏經傳一部四卷右四傳十卷同帙賢聖集傳二十六部四十四卷四帙佛所行讚傳一部五卷馬鳴菩薩造禪法要解一部二卷勝宗十句義論一卷右三經八卷同帙禪祕要經四卷亦云禪祕要無經字禪祕要經一部五卷一名禪法要或為三卷治禪病祕要一卷右三經十卷同帙百喻集一部二卷菩薩本緣集一部三卷僧伽斯那撰或四卷阿育王傳一部五卷或七卷孛經抄集一卷無明羅剎集一卷分別業報略集經大勇菩薩撰龍樹菩薩為禪陀迦王説要偈亦云勸發諸王要偈右二經同卷金七十論一部三卷請賓頭盧經賓頭盧為王説法西域抄集賓頭盧突羅闍為優陀延王説法右三經同卷馬鳴菩薩傳龍樹菩薩傳提婆菩薩傳婆藪槃豆傳撰集三藏及雜傳西域聖賢所撰出真寂寺録右五傳同卷自百喻等十四經十卷同帙四阿含暮抄二集大阿羅漢陀蜜多法住記一卷法句集一部二卷僧伽羅剎集經一部三卷付法藏經傳一部四卷右五傳等十二卷同帙武周刊定衆經目録卷第十四見定流行入藏目卷下天策萬歲元年十月二十六日都檢校刊定經目及經真偽佛授記寺大德僧明佺
