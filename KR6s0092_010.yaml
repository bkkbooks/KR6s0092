body:
  text: 大唐天后敕佛授記寺沙門明佺等撰小乘律小乘論賢聖集傳一百九十四部一千三百四十一卷小乘律一百四部四百二十八卷十誦律一部五十九卷右後秦弘始年弗若多羅譯羅什度語出長房録十誦律一部六十二卷一千六百六十五紙右東晉卑摩羅叉於壽春石㵎寺譯出三卷足前五十九成六十二卷出長房録十誦比丘尼戒一卷或有經字與曇摩特所出少異右西晉竺法護譯出長房録十誦比丘戒本一卷二十九紙右東晉孝武帝代太康六年竺曇無蘭於楊都謝鎮西寺合僧純曇摩持竺僧舒三家共為一卷出長房録毗尼誦一部三卷是十誦後善誦右東晉安帝代罽賓國三藏律師卑摩羅叉於長安譯出長房録十誦比丘戒本一卷二十九紙右前秦沙門曇摩持共竺佛念於長安譯出長房録十誦比丘尼戒本一卷三十四紙右前秦沙門慧常共曇摩持於長安譯出長房録教授比丘尼二歲壇文一卷右前秦曇摩持共竺佛念譯出長房録十誦律釋雜事問一部二卷右前秦曇摩蜱譯出靜泰録十誦比丘尼戒所出本末一卷右後秦涼州沙門竺佛念譯出長房録十誦律雜事一卷右後秦罽賓沙門曇摩耶舍譯出寶唱録十誦律比丘尼戒本一卷與曇摩持譯者少異右後秦弘始年羅什於長安譯出長房録十誦僧尼要事羯磨一部二卷右宋廢帝代律師釋僧璩譯出長房録四分律一部四十五卷或七十卷或六十卷一千五百二十八紙右後秦弘始年佛陀耶舍共竺佛念於常安譯出長房録四分比丘僧戒本一卷二十七紙右後秦佛陀耶舍於常安譯出內典録曇無德羯磨一卷四十六紙右前魏正元元年曇諦於洛陽譯出內典録四分羯磨經一卷或云比丘尼羯磨十五紙右宋元嘉八年求那跋摩於楊州祇洹寺譯出長房録四分比丘戒本一卷右梁天監三年靈曜寺沙門僧威出見寶唱録四分比丘尼戒本一卷右天監三年靈曜寺沙門僧威出見寶唱録摩訶僧祇律一部四十卷一千一百三十五紙右東晉安帝代義熙十二年沙門佛陀跋陀羅共法顯於楊都及廬山譯出長房録僧祇戒本一卷初出右前魏嘉平年沙門曇柯迦羅於白馬寺譯出長房録摩訶僧祇比丘尼羯磨一卷右東晉義熙年中沙門佛馱於道場寺譯出長房録僧祇大比丘戒本一卷第二譯二十紙右東晉安帝代義熙十二年沙門佛陀跋陀羅於楊都及廬山譯出長房録僧祇比丘尼戒本一卷第二出與魏世柯迦羅出者小異右東晉安帝代法顯共覺賢譯出長房録彌沙塞五分律一部三十四卷六百九十四紙右宋景平元年沙門佛陀什共竺道生智勝釋慧嚴於楊都龍光寺譯出長房録彌沙塞比丘戒本一卷或云五分戒本十九紙右宋景平年沙門佛陀什等於楊都譯出長房録彌沙塞羯磨一卷右宋景平年沙門佛陀什等於楊都譯出長房録彌沙塞尼戒本一卷右梁普通三年釋明徵於建初寺出見寶唱録彌沙塞律抄一卷右師子國沙門僧伽跋彌譯出寶唱録二百六十戒合異二卷右後漢明帝代竺法蘭譯出長房録犯戒罪報輕重經一卷一名犯罪經二紙右後漢代安世高譯出長房録大比丘三千威儀經一部四卷或二卷四十七紙右後漢代安世高譯出長房録恆水不說戒經一卷右後漢代安世高譯出達摩録及王宗録道本五戒經一卷出長房録威儀經一卷出長房録衣服制經一卷出長房録沙彌離威儀經一卷出長房録大戒經一卷出長房録戒消災經一卷或云戒伏消災經四紙右吳代支謙譯出長房録大比丘威儀經一部二卷右道安云晉代竺法護出見僧祐録誡具經一卷右西晉沙門竺法護譯出長房録迦葉結集傳經一卷或云結集戒經右西晉武帝代竺法護譯出長房録誡王經一卷右西晉武帝代竺法護譯出長房録誡羅云經一卷右西晉代竺法護譯出長房録遺教法律三昧經一部三卷或二卷右西晉法炬法立譯出長房録二百六十戒三部合異二卷右東晉孝武帝代竺曇無蘭於楊都謝鎮西寺譯出長房録毗尼母論一部八卷一百一十二紙右東晉太安年符蘭譯出達摩鬱多羅録阿毗曇心偈一部四卷八十紙右東晉太安元年僧伽提婆譯出達摩鬱多羅録教誡比丘尼法一卷右東晉武帝代沙門瞿曇僧伽提於廬山譯出長房録雜問律事一部二卷右東晉安帝代卑摩羅叉譯出長房録雜問律事一部二卷譯處不同文與前異見別録右東晉安帝隆安四年三藏律師曇摩譯出長房録迦葉結集戒經一卷右東晉釋嵩公譯出長房録迦葉禁戒經一卷一名摩訶比丘經一名真僞沙門經三紙右東晉釋退公譯出長房録比丘尼戒一卷右前秦簡文帝代律師慧常共曇摩持竺佛念等於長安譯出長房録鼻奈耶律一部十卷一名戒因緣經右後秦竺佛念等於長安譯出長房録優婆塞戒本一卷右北涼曇無讖共沮渠蒙遜譯出寶唱録大愛道比丘尼經一部二卷右僧祐録云涼土異經解脫戒本一卷出迦葉毗律二十一紙右後魏瞿曇般若留支譯出長房録律二十二明了論一卷亦直云明了論二十四紙右陳代三藏真諦譯出長房録遺教論一卷右陳代三藏真諦譯出長房録僧澀多律一卷陳言總攝右陳代三藏真諦譯出長房録沙彌威儀經一卷十九紙右宋求那跋摩於楊都譯出內典録優婆塞五戒略論一卷一名優婆塞五戒相右宋元嘉八年求那跋摩於祇洹寺譯出長房録優婆塞五戒相一卷十五紙右宋元嘉年求那跋摩譯出寶唱録優婆塞五戒威儀經一卷二十三紙右宋元嘉八年求那跋摩於祇洹寺譯出寶唱録薩婆多摩得勒伽一部十卷二百四十四紙右宋元嘉年僧伽跋摩於楊都譯出內典録六齊八戒經一卷右宋文帝代元嘉年求那跋陀羅於楊都譯出長房録賢者律儀經一卷亦云威儀經右宋武帝代北涼安陽侯沮渠京聲譯出長房録迦葉禁戒經一卷右宋孝武帝代北涼安陽侯沮渠京聲譯出長房録優婆塞五戒經一卷一名五相經右宋孝武帝代北涼安陽侯沮渠京聲譯出長房録真僞沙門經一卷一名摩訶比丘經三紙右宋孝武帝代沙門慧簡於鹿野寺譯出長房録決定諸部毗尼一部二卷右宋代升明元年釋道儼依諸律出見長房録他毗利律一卷右前齊武帝代沙門摩訶乘於廣州竹林寺譯出長房録善見毗婆沙律一部一十八卷四百二十六紙右南齊武帝代沙門釋僧猗於廣州竹林寺請外國法師僧伽跋陀羅譯出長房録毗跋律一卷右齊永明年外國沙門釋法度譯出寶唱録弟子耆域述慢戒經一卷右宋孝武代北涼沮渠京聲譯出長房録賢者威儀經一卷右宋孝武代北涼沮渠京聲譯出長房録經律分異記一卷三乘無當律一卷長房録四部律所明輕重物名一卷長房録比丘戒所出本末一卷長房録諸律解一卷長房録比丘波羅提木叉一卷僧祐録結界文經一卷僧祐録優波離問佛經一卷或云優波離律二十三紙長房録應行律經一卷三紙寶唱録比丘諸禁律一卷僧祐録大沙門百一羯磨一卷二十二紙長房録五戒報應經一卷寶唱録瞻波國佛說戒經一卷長房録目連問經一卷二十七紙沙彌尼十戒一卷五部威儀服飾經一卷一名五部僧服色名經寶唱録賢者雜事經一卷僧祐録在家律儀經一卷長房録犍捶法一卷長房録出律儀要一部二十二卷長房録沙彌十戒并威儀一卷二十一紙寶唱録沙彌離戒經一卷長房録舍利弗問經一卷十一紙長房録二百五十戒一卷長房録優婆塞五學略論一部二卷長房録薩婆多毗尼毗婆沙一部九卷或八卷一百九十七紙長房録以上除正律本外並是諸律枝派小乘論五十四部八百五十六卷阿毗曇九十八結法一卷長房録云阿毗曇九十八結經右後漢安世高譯出長房録分別功德論一部五卷或四卷或三卷七十二紙右西晉代竺法護譯釋增一阿含義出達摩鬱多羅録三法度論一部二卷或三卷右東晉太元十六年僧伽提婆於廬山譯出長房録雜阿毗曇心一部十三卷右東晉安帝隆安三年沙門法顯共覺賢譯是第二出與前秦僧伽跋澄出者大同小異出高僧傳阿毗曇心一部十六卷或十三卷右晉孝武帝代罽賓沙門僧伽提婆譯出長房録阿毗曇心一部四卷右晉孝武帝代僧伽提婆於廬山為遠法師譯出長房録尊婆須蜜所集論一部十二卷或十卷三百七紙右前秦建元十九年僧伽跋澄共佛念譯出長房録阿毗曇毗婆沙一部十四卷或十一卷僧祐録云雜阿毗曇毗婆沙或有心字右前秦代僧伽跋澄秦言衆現譯出長房録阿毗曇心一部五卷右前秦建元年僧伽提婆共道安於長安譯出義善寺録鞞婆沙阿毗曇論一部十九卷或十五卷或十四卷或云毗婆沙亦云廣說四百五十紙右前秦建元年僧伽提婆於洛陽譯出長房録三法度論一部二卷右前秦曇摩難提於長安譯與僧伽提婆譯者小異出長房録阿毗曇八犍度一部三十卷或二十卷一名迦旃延阿毗曇八犍度四百五十紙右前秦建元年沙門僧伽提婆共竺佛念譯出長房録舍利弗阿毗曇一部三十卷或二十卷或二十二卷七百六十紙右後秦弘始十年沙門曇摩崛多共曇摩耶舍於長安譯出長房録成實論一部二十四卷或二十卷或十六卷或十四卷四百七十七紙右後秦羅什於長安譯出長房録阿毗曇八犍度毗婆沙一部八十四卷或一百九卷或六十卷一千三百七十八紙右北涼沮渠代浮陀跋摩共道挻等於姑臧譯出長房録犢子道人問論一卷右後魏代興和年瞿曇般若留支於鄴都金花寺譯出長房録阿毗曇甘露味一部二卷或云甘露味阿毗曇右魏齊王代失譯出長房録衆事分阿毗曇論一部十二卷二百三十七紙右宋元嘉十二年文帝代求那跋陀羅於楊都譯出長房録雜阿毗曇毗婆沙一部十四卷第二出右宋文帝元嘉十年僧伽跋摩於長干寺譯出長房録雜阿毗曇心一部十卷右宋元嘉三年伊葉波羅譯至擇品輟出長房録雜阿毗曇心一部十三卷或十四卷三百二十七紙右宋元嘉八年求那跋摩譯出長房録解脫道論一部十三卷或十二卷一百九十八紙右梁代天監十四年僧伽婆羅於楊都占雲館譯出長房録三世分別論一卷右梁承聖年三藏真諦於廣州譯出長房録法勝阿毗曇論一部六卷一百三紙右後齊天統年耶舍共法智譯又達摩鬱多羅録云姚秦代跋澄誦佛念譯出內典録別譯法勝阿毗曇心一部六卷一百二十二紙右齊天統五年耶舍共法智譯出達摩鬱多羅録四諦論一部四卷七十紙右陳代三藏真諦於廣州南康郡譯出長房録隨相論一部二卷三十四紙或云求那摩諦隨相論右陳代三藏真諦譯出內典録十八部論一卷七紙右陳代三藏真諦譯出內典録部異執論一卷九紙一名執部異論右陳代三藏真諦於廣州制旨王園寺譯出長房録立世阿毗曇論一部十卷一百七十三紙右陳代永定三年三藏真諦於廣州制旨王園二寺於始興郡譯出長房録俱舍論偈一卷右陳代三藏真諦於廣州制旨王園二處譯出長房録俱舍釋論一部二十二卷四百五十八紙右陳代三藏真諦於廣州制旨王園寺譯出長房録須跋陀羅因緣論一部二卷右周武帝代三藏法師耶舍崛多於四天王寺譯出長房録大毗婆沙論一部二百卷三千一百九紙右大唐永徽年三藏玄奘於西京譯出內典録順正理論一部八十卷一千四百二十紙右大唐永徽年三藏玄奘於大慈恩寺譯出內典録顯宗論一部四十卷六百四十四紙右大唐永徽年三藏玄奘於大慈恩寺譯出內典録發智論一部二十卷三百六十四紙右大唐永徽年三藏玄奘於內宮中譯出內典録阿毗達磨俱舍論一部三十卷四百七十紙右大唐顯慶年三藏玄奘於內宮中譯出內