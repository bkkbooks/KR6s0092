body:
  text: 大唐天后勅佛授記寺沙門明佺等撰小乘重譯經目卷之二二百七十九部三百八十一卷出曜經一部十九卷右秦代涼州沙門竺佛念譯出長房錄承事勝已經一卷出第十四卷右後漢代安世高譯出長房錄斫毒樹復生經一卷出第三卷右後漢代安世高譯出長房錄長者夜輸得非常觀經一卷出第十九卷右後漢代安世高譯出長房錄七老婆羅門請為弟子經一卷出第一卷右後漢代安世高譯出長房錄佛說孤母喪一子經一卷出第二卷右後漢代安世高譯出長房錄佛度旃陀羅兒經一卷出第十三卷右後漢代安世高譯出長房錄多倒見眾生經一卷出第十六卷右後漢代安世高譯出長房錄調達生身入地獄經一卷亦名提婆達生身入地獄經出第十六卷右後漢代安世高譯出長房錄佛神力救長者子經一卷出第八卷右後漢代安世高譯出長房錄最勝長者受呪願經一卷出第八卷右後漢代安世高譯出長房錄良時難遇經一卷出第五卷或第六卷右後漢代安世高譯出長房錄求離牢獄經一卷出第四卷右後漢代安世高譯出長房錄慈仁不殺經一卷出第七卷右後漢代安世高譯出長房錄佛說摩那祇全身入地獄經一卷出第七卷右後漢安世高譯出長房錄梵志問世間損減經一卷出第二卷右吳支謙譯出長房錄瞎鱉經一卷出第一卷右吳支謙譯出長房錄佛說法施勝經一卷出第十五卷右吳代支謙譯出長房錄水上泡經一卷出第十六卷右吳代支謙譯出長房錄梵志問佛師經一卷出第十四卷右吳代支謙譯出長房錄三魚失水經一卷出第二卷右吳支謙譯出長房錄梵志子死稻敗經一卷出第六卷右吳支謙譯出長房錄佛說護口意經一卷出第七卷右吳代支謙譯出長房錄降千梵志經一卷出第五卷右吳支謙譯出長房錄甘露道經一卷出第四卷右吳支謙譯出長房錄女人欲熾迷荒經一卷出第三卷右西晉竺法護譯出長房錄佛說窹意經一卷出第十卷右西晉武帝代法護譯出長房錄長壽王經一卷出第十卷右道安云晉代竺法護譯出僧祐錄梵志試火恩經一卷出第十卷右道安云晉代竺法護譯出僧祐錄佛說歡喜過差天經一卷出第六卷右道安云晉代竺法護譯出僧祐錄出曜華經一卷出第十三卷右道安云晉代竺法護譯出僧祐錄六師結誓經一卷出第十四卷右道安云晉代竺法護譯出僧祐錄無病第一利經一卷出第十五卷右道安云晉代竺法護譯出僧祐錄童子問佛乞食事經一卷出第十六卷右道安云晉代竺法護譯出僧祐錄乞兒發惡心經一卷出第十八卷右道安云晉代竺法護譯出僧祐錄慳貪長者經一卷出第三卷右道安云晉代竺法護譯出僧祐錄佛說多聞經一卷出第四卷右西晉代竺法護譯出長房錄瓦師逃走經一卷出第一卷右道安云晉代竺法護譯出僧祐錄比方世利經一卷出第八卷右西晉惠帝代法炬法立譯出長房錄貧子得財發狂經一卷出第三卷右西晉代法炬法立譯出長房錄拘提比丘經一卷出第五卷右西晉代法炬法立譯出長房錄深淺學比丘經一卷出第四卷或第五卷右西晉代法炬法立譯出長房錄放逸經一卷出第四卷右西晉惠帝代沙門法炬法立譯出長房錄坐禪比丘命過生天經一卷出第三卷右西晉代法炬法立譯出長房錄阿梵和利比丘無常經一卷出第二卷右西晉代法炬法立譯出長房錄比丘問佛何故捨世學道經一卷出第二卷右西晉竺法炬法立譯出長房錄有眾生三世作惡經一卷出第八卷右西晉惠帝代法炬法立譯出長房錄瑠璃攻釋子經一卷出第八卷右西晉惠帝代竺法炬共法立譯出長房錄佛說信能渡河經一卷出第八卷右西晉惠帝代竺法炬共法立譯出長房錄聰明比丘經一卷出第十卷右西晉惠帝代沙門竺法炬共法立譯出長房錄說法難值經一卷出第十一卷右西晉惠帝代法炬法立譯出長房錄調達問佛顏色經一卷出第十一卷右西晉惠帝代法炬法立譯出長房錄佛看病比丘不受長者請經一卷出第二卷右西晉竺法炬法立譯出長房錄佛說無常經一卷出第一卷右西晉代法炬法立譯出長房錄比丘求證人經一卷出第一卷右西晉惠帝代法炬法立譯出長房錄佛說群牛千頭經一卷出第一卷右東晉孝武帝代竺曇無蘭譯出長房錄集修行事經一卷出第二卷右東晉竺曇無蘭譯出長房錄波利比丘謗梵行經一卷出第七卷右東晉孝武代竺曇無蘭譯出長房錄二僑士經一卷出第十卷右宋文帝代求那跋陀羅於荊州新寺譯出長房錄目連弟布施望即報經一卷出第十六卷右宋文帝代求那跋陀羅譯出長房錄佛命阿難詣最勝長者經一卷出第八卷右宋文帝代求那跋陀羅譯出長房錄阿難見伎樂啼哭無常經一卷出第一卷右宋文帝代求那跋陀羅譯出長房錄佛往慰迦葉病經一卷出第六卷右宋文帝代元嘉年求那跋陀羅譯出長房錄獵師捨家學道經一卷出第三卷右宋孝武帝代沙門慧簡譯出長房錄佛說竊為沙門經一卷出第一卷右宋孝武帝代沙門慧簡鹿野寺譯出長房錄國王厭世典經一卷出第十二卷昔有二人相愛敬經一卷出第六卷瑠璃王入地獄經一卷出第十六卷異象經一卷出第五卷鍾磬貧乏經一卷童子善射術經一卷出第二卷善唄比丘經一卷出第十四卷右已上七十一經是出曜經出以下雜阿含經雜阿含經一部五十卷一百四十四經別一千二百四十紙右宋文帝元嘉年求那跋陀羅於楊州瓦官寺譯出長房錄七處三觀經一卷或二卷二十六紙右後漢代安世高譯出長房錄九橫經一卷三紙右後漢代安世高譯出長房錄八正道經一卷二紙右後漢代安世高譯出長房錄五陰譬喻經一卷一名水沫所漂經二紙右後漢代安世高譯出長房錄轉法輪經一卷十紙右後漢代安