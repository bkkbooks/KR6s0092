稱讚大乘功德經一卷五紙佛地經一卷十紙顯無邊佛土功德經一卷二紙勝幢臂印陀羅尼經一卷二紙拔濟苦難陀羅尼經一卷二紙八名普密陀羅尼經一卷二紙持世陀羅尼經一卷七紙緣起聖道經一卷五紙六門陀羅尼經一卷二紙般若多心經一卷一紙天請問經一卷三紙十二緣起經一卷二紙寂照神變三摩地經一卷右並大唐玄奘譯大乘四法經一卷一紙造塔功德經一卷二紙大方廣師子吼經一卷六紙右並大唐永隆元年地婆訶羅於東太原寺譯大乘百福相經一卷八紙右大唐永淳二年地婆訶羅於西京西太原寺歸寧院譯大乘密嚴經一部三卷六十三紙右大唐三藏地婆訶羅譯七俱胝佛母心大準提陀羅尼經一卷四紙右大唐垂拱元年地婆訶羅於西京西太原寺譯方廣大莊嚴經一部十二卷二百四十六紙右大唐垂拱元年三藏地婆訶羅於西京西太原寺歸寧院譯智炬陀羅尼經一卷四紙諸佛集會陀羅尼經一卷四紙右二本經大周天授二年于闐三藏提雲般若於大周東寺譯隨求所得自在陀羅尼經一卷右大周長壽二年天竺三藏寶思惟於天宮寺譯護命法門神呪經一卷十三紙右大周長壽二年菩提留志於佛授記寺譯大乘金剛髻珠菩薩修行分經一卷二十一紙有德女所問大乘經一卷五紙右二經大周長壽二年南天竺國三藏菩提留志於大周東寺譯文殊師利所説不思議佛境界經一部二卷或一卷二十七紙右大周長壽二年三藏法師菩提留志於大周東寺譯菩薩道地經一卷安公云出方等部摩訶遮曷旋經一卷摩訶厥彌難問經一卷或云大厥彌經菩薩等行經一卷菩薩十漚惒經一卷菩薩本行經一卷摩訶乾陀惟衛羅盡信比丘等度經一卷舊録云盡信比丘經大本藏經一卷以前八經僧祐録云古異經陀羅尼集一部十卷一百八十七紙一名雜呪經首楞三昧經一部二卷出生菩提經一卷毗羅三昧經一部二卷右宋代沙門釋智嚴譯決定罪福經一卷右北涼代沙門曇無讖譯法社經一部二卷右西晉代沙門竺法護譯
