body:
  text: 大唐天后敕佛授記寺沙門明佺等撰大乘律大乘論目合為一卷一百五十二部七百一十六卷菩薩戒者警也勒也警勒身心發大意乘大願趣大果廣度生宣大學處據托之於此大乘律五十四部佛藏經一部四卷或三卷亦名選擇諸法經右秦弘始七年羅什譯出達摩鬱多羅録及長房録佛藏大方等經一卷亦名問明顯經右宋代釋道嚴譯出長房録佛悔過經一卷右晉代竺法護譯出長房録文殊師利悔過經一卷一名文殊師利五體悔過經二十四紙右晉代竺法護譯出長房録文殊師利淨律經一卷一名淨律經十五紙右西晉代竺法護於白馬寺譯出達摩鬱多羅録及長房録文殊師利淨律經一卷第二出與法護譯小異右西晉代元康年聶道真譯出長房録文殊師利悔過經一卷右秦羅什譯出長房録菩薩善戒經一部二十卷右長房録及竺道祖録云罽賓國三藏求那跋摩宋言功德鎧元嘉年來達于建鄴於祇洹寺第二出與支讖翻八卷小異見竺道祖録及高僧傳後弟子定林更出二品成三十卷菩薩善戒經一部十卷一百六十四紙右寶唱僧祐録云祇洹寺僧慧義宋元嘉八年二月二十一日請罽賓沙門求那跋摩於寺譯慧義筆受餘二卷而移定林夏坐使弟僧伽跋摩代竟未及繕寫失序品後而跋摩泥洹但寫為八卷名菩薩戒經又名菩薩地經時祇洹寺法矜作經後記曰同寺釋法明始與慧義共譯受明謂義所詳定本過省略更取初本復自斟酌亦為八卷名為地持加首一偈類於數論摩訶乘死疑律師撿得序品及戒品後分寫足為十卷依付囑文名菩薩善戒經未及次比疑亡天監十年敕使寶唱制序撰定諸品次比也出竺道祖晉世雜録用一百十三紙菩薩戒經一部八卷又名菩薩地經右北涼曇無讖於姑臧譯出長房録菩薩地持經一部八卷或四卷右僧祐録云曇無讖從天竺齎梵本來至西涼州為河西王大沮渠蒙遜譯出竺道祖河西録未詳二説故二記僧祐云與上求那譯者一經再出大同小異菩薩善戒經一卷十五紙右元嘉八年求那跋摩於寺譯出寶唱録靜太師録福林寺録並云闕本後訪得菩薩內戒經一卷二十紙右宋文帝代求那跋摩譯出達摩鬱多羅録菩薩戒要義經一卷右西晉元康年聶道真譯出長房録菩薩戒獨受壇文一卷右西晉惠帝元康年聶道真譯出長房録菩薩齋經一卷一名賢首菩薩齋法經右西晉竺法護譯出長房録菩薩受齋經一卷右晉代聶道真譯出長房録菩薩懺悔法一卷異出同本右西晉惠帝太康年聶道真譯出長房録菩薩悔過法經一卷或無經字下注云出龍樹十住論右西晉代竺法護譯出長房録菩薩齋法經一卷一名正齋經一名持齋經八紙右晉代竺法護譯出長房録菩薩正齋經一卷右東晉祇多蜜譯出長房録菩薩戒本一卷十八紙右後秦弘始年羅什譯出長房録菩薩戒本經一卷右北涼沮渠蒙遜世沙門曇無讖於姑臧譯出義善寺録菩薩戒優婆塞戒壇文一卷右北涼代曇無讖與慧嵩譯出長房録菩薩戒本一卷異本第二出右北涼代曇無讖與慧嵩等譯出長房録菩薩受戒經一卷右曇無讖將來於高昌譯出寶唱録菩薩藏經一卷右梁天監十六年僧伽婆羅譯出寶唱録菩薩五法懺悔經一卷二紙右福林寺録云後訪得經律菩薩羯磨一卷六紙右大唐貞觀二十三年三藏玄奘於翠微宮譯出內典録菩薩戒本一卷右大唐貞觀年玄奘於翠微宮譯出內典録舍利弗悔過經一卷右後漢安世高譯出長房録舍利弗悔過經一卷亦名悔過經六紙右西晉竺法護譯出內典録舍利弗悔過經一卷右秦羅什譯出達摩鬱多羅録離欲優婆塞優婆夷戒文右東晉孝武帝三藏曇無蘭於謝鎮西寺譯出長房録優婆塞戒經一部十卷或七卷或六卷或五卷一百五十四紙右北涼承玄元年曇無讖於涼州間豫宮譯出長房録離欲優婆塞優婆夷具行二十二戒經一卷一名三歸優婆塞戒一名善信二十二戒右宋元嘉年求那跋摩譯出長房録優婆塞戒本一卷右一經出優婆塞戒經出真寂寺録梵網經一部二卷或三卷右後漢獻帝外國沙門康孟詳譯出長房録梵網經一部二卷三十九紙右後秦羅什譯出長房録決定毗尼經一卷二十二紙右於涼州北涼燉煌譯不顯人名出達摩鬱多羅録三十五佛名經一卷出決定毗尼經右道安云晉代竺法護出見僧祐録菩薩布施懺悔法一卷出決定毗尼經右西晉惠帝太康年聶道真譯出長房録法律三昧經一卷八紙右後漢安世高譯出達摩鬱多羅録法律三昧經一卷一云法律經右吳支謙譯出長房録淨業障經一卷十八紙右晉武帝代竺法護譯出達磨鬱多羅録清淨毗尼方廣經一卷二十紙右秦羅什譯出達摩鬱多羅録大方廣三戒經一部三卷五十四紙右北涼曇無讖譯出達摩鬱多羅録寶梁經一部二卷四十四紙右北涼道龔譯出達摩鬱多羅録又出長房録迦葉經一部二卷四十五紙右元魏興和二年月婆首那於鄴都譯出長房録寂調音所問經一卷一名如來所説清淨調伏經二十一紙右宋代沙門法海譯出達摩鬱多羅録及出長房録大乘三聚懺悔經一卷十三紙右隋開皇年闍那崛多及笈多於興善寺譯出福林寺録菩薩波羅提木叉經一卷在家菩薩戒一卷在家律儀一卷大乘論一百八部六百六十一卷大智度論一部一百卷或一百一十卷或七十卷二千三百九十八紙龍樹菩薩造右秦弘始年羅什於長安譯出長房録瑜伽師地論一部一百卷一千八百四十八紙右大唐貞觀二十年三藏玄奘於大慈恩寺譯出內典録瑜伽師地論釋一卷最勝子菩薩造右大唐三藏玄奘譯出內典録顯揚聖教論一部二十卷三百二十六紙右大唐貞觀十九年三藏玄奘於弘福寺譯出內典録顯揚聖教論頌一卷右大唐三藏玄奘譯出內典録阿毗達磨雜集論一部十六卷二百五十五紙右大唐貞觀十九年三藏玄奘於弘福寺譯出內典録阿毗達磨集論一部七卷一百八紙右大唐顯慶年三藏玄奘譯出內典録般若燈論一部一十五卷或十三卷二百四十三紙右大唐貞觀三年波羅頗蜜多於勝光寺譯出內典録大莊嚴論一部一十五卷或十卷二百三十三紙馬鳴菩薩造右後秦羅什譯出長房録大乘莊嚴論一部一十三卷或十五卷二百紙右大唐貞觀四年波羅頗蜜多於勝光寺譯出內典録十住毗婆沙論一部十五卷或十四卷三百九十紙龍樹菩薩造右後秦羅什於長安譯出長房録十地經論一部十二卷初譯右後魏武帝正始五年勒那摩提於洛陽殿內譯出長房録十地經論一部十二卷二百八十四紙右後魏宣武皇帝永明年沙門菩提留支於洛陽譯帝筆受出長房録攝大乘釋論一部十五卷或十二卷三百三十紙右陳天嘉四年三藏真諦於廣州制旨寺譯出長房録攝大乘釋論一部十二卷三百四十五紙右陳真諦於廣州譯出內典録攝大乘論一部十卷一百二十五紙右隋大業五年笈多於東都上林園譯出內典録攝大乘釋論一部十卷世親造一百八十紙右大唐三藏玄奘於北闕及大慈恩寺譯出內典録攝大乘釋論一部十卷無性菩薩造二百二十紙右大唐永徽年玄奘於大慈恩寺譯出內典録攝大乘本論一部二卷四十四紙右後魏普泰元年北天竺三藏佛陀扇多於洛陽白馬寺及鄴都金華寺譯出長房録攝大乘本論一部三卷五十八紙右陳代沙門真諦於廣州王園譯出長房録攝大乘本論一部三卷六十一紙右大唐貞觀二十二年玄奘於玉華宮譯出內典録釋大乘論一部二十卷四百紙右梁太清二年頗羅墮拘羅那他譯出達磨鬱多羅録菩薩地持論一部十卷或八卷二百五十紙右北涼沙門曇無讖於姑臧譯出內典録廣百論一部十卷二百二紙右大唐顯慶年三藏玄奘於慈恩寺譯出內典録廣百論頌一卷十六紙右大唐貞觀二十一年三藏玄奘從駕於翠微宮內譯出內典録百論一部二卷提婆菩薩造四十二紙右後秦羅什於長安譯出長房録佛地經論一部七卷一百一十九紙右大唐永徽年三藏玄奘譯出內典録菩提資糧論一部六卷一百六十七紙右隋大業五年三藏達摩笈多於東都上林園譯出內典録彌勒菩薩問經論一部十卷或六卷或五卷一百四十五紙右後魏菩提留支於洛陽譯出長房録寶積經論一部四卷九十九紙右後魏菩提留支譯出長房録勝思惟梵天所問經論一部四卷或三卷六十紙右後魏普泰元年菩提留支於洛陽譯出長房録佛性論一部四卷八十二紙右陳代三藏真諦譯出長房録中論一部四卷一百三紙或八卷右後秦羅什於長安譯出長房録究竟一乘寶性論一部五卷或四卷或三卷九十八紙亦云寶性分別大乘曾上論右後魏勒那摩提譯出長房録寶性論一部四卷或五卷右後魏菩提留支於洛及鄴譯出長房録寶積經論一部四卷右後魏勒那摩提於洛陽殿內譯出長房録本有今無論一卷右梁武帝代三藏真諦譯出長房録文殊問菩提心經論一部二卷一名伽耶山頂經論三十四紙右後魏菩提留支於洛陽譯出長房録大丈夫論一部二卷提婆菩薩造四十紙右北涼道泰譯出內典録中邊分別論一部二卷三十八紙右陳真諦譯出內典録辨中邊論一部三卷右大唐三藏玄奘譯出內典録辨中邊論頌一卷右大唐三藏玄奘譯出內典録中論一卷右梁承聖年沙門真諦譯出長房録佛阿毗曇論一部二卷四十四紙右陳代沙門真諦譯出內典録順中論一部二卷右後魏菩提留支於洛陽譯出長房録金剛般若論一部二卷二十八紙右隋大業九年笈多於東都上林園譯出內典録三無性論一部二卷四十四紙或一卷右陳代沙門真諦譯出內典録金剛般若論一卷右陳代真諦於廣州制旨王園寺譯出長房録金剛般若經論一部三卷五十五紙右後魏永平二年三藏菩提留支於太上文宣公第譯出長房録金剛般若波羅蜜經破取著不壞假名論一部二卷三十九紙右大唐永淳二年九月十五日三藏地婆訶羅於西京西太原寺歸寧院譯新編入録掌珍論一部二卷三十二紙右大唐貞觀二十一年三藏玄奘從駕於翠微宮譯出內典録王法正理論一卷十七紙右大唐貞觀二十一年三藏玄奘從駕於翠微宮譯出內典録成業論一卷十七紙右大唐貞觀二十二年三藏玄奘譯出內典録業成就論一卷十七紙右後魏瞿曇般若留支譯出內典録成唯識論一部十卷護法等菩薩造右大唐三藏玄奘譯出內典録唯識論一卷唯識無境界十九紙右後魏瞿曇般若留支譯出長房録唯識論一卷修道不共他與元魏留支譯者小異十一紙右陳代三藏真諦譯出內典録唯識二十論一卷天親菩薩造九紙右大唐三藏玄奘譯出靖邁經圖唯識三十論一卷右大唐三藏玄奘譯出靖邁經圖思塵論一卷三紙右陳代真諦譯出靖邁經圖觀所緣緣論一卷三紙右大唐三藏玄奘譯出靖邁經圖三具足論一卷二十紙右後魏正始五年菩提留支於洛及鄴譯出長房録法華經論一卷右梁武帝代中天竺國三藏勒那摩提或云婆提正始五年於洛陽譯初出菩提留支助傳後各別譯出長房録妙法蓮華經論一部二卷二十九紙右後魏菩提留支於鄴下譯出靖邁經圖顯識論一卷因明正理門論一卷陳那菩薩造十二紙右大唐貞觀二十一年三藏玄奘從駕於翠微宮譯出內典録因明入正理門論一卷商羯羅主造六紙右大唐貞觀二十一年三藏玄奘從駕於翠微宮譯出內典録大乘五蘊論一卷八紙右大唐貞觀二十一年三藏玄奘從駕於翠微宮譯出內典録百法明門論一卷兩紙右唐貞觀二十一年三藏玄奘從駕於翠微宮譯出內典録十二門論一卷龍樹菩薩造二十八