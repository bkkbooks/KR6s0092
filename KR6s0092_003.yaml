body:
  text: 大唐天后敕佛授記寺沙門明佺等撰大乘重譯經目卷之二一百六十八部三百三十八卷合維摩經一部五卷右西晉支敏度合支謙竺法護竺叔蘭三本共合為部出長房録古維摩詰經一部二卷初出右漢靈帝代臨淮清信士嚴佛調在洛陽譯出長房録維摩詰所說不思議法門經一部三卷或二卷一名佛法普入道門三昧經右吳黃武年優婆塞支謙譯與後漢代嚴佛調譯小異出長房録毗摩羅鞊經一部二卷五十二紙右吳黃武年優婆塞支謙於武昌譯出長房録維摩詰說不思議法門稱經一部二卷或一卷一名普入道門經右西晉太安二年沙門竺法護譯第三出與漢世嚴佛調吳世支謙譯大同小異出長房録刪維摩鞊經一卷右西晉代竺法護譯出僧祐録異維摩詰經一部三卷第五譯或二卷或作思維摩經右西晉惠帝元康六年沙門竺叔蘭於洛陽譯出長房録維摩詰經一部四卷第三出右東晉沙門祇多蜜譯出長房録維摩詰所說經一部三卷七十紙右後秦弘始八年沙門鳩摩羅什於長安譯出長房録說無垢稱經一部六卷一百一十紙右大唐貞觀年沙門玄奘於大慈恩寺譯上件十經本同譯別理合不殊大方等頂王經一卷亦名善思童子經亦名維摩詰子問經亦名頂王經初出二十一紙右西晉永嘉二年沙門竺法護譯出長房録大方等頂王經一卷第二出與法護譯大頂王經文少異右後秦弘始年鳩摩羅什於長安逍遙園譯出長房録大乘頂王經一卷右梁武帝代優禪尼國王子月婆首那譯出長房録上三經同本別出維摩氣分佛語經一卷三紙右後魏菩提留支譯出長房録佛語經一卷右周武帝代三藏法師闍那崛多譯出長房録上二經同本別譯觀普賢菩薩經一卷右後秦鳩摩羅什於長安逍遙園譯出長房録觀普賢菩薩行法經一卷或云出深功德經亦云普賢觀經十七紙右宋元嘉年曇摩蜜多於楊州道場寺譯出長房録上二經同本別譯藥王藥上菩薩觀經一卷右後漢安世高譯出長房録觀藥王藥上菩薩經一卷二十一紙右宋元嘉年疆良耶舍於道林寺譯出長房録上二經同本別譯金色王經一卷八紙右後魏曇摩留支於洛都譯出長房録金色王經一卷右元魏瞿曇般若留支譯出長房録上二經同本別譯頻毗娑羅王詣佛供養經一卷五紙右西晉惠帝代法炬法立譯出長房録頻婆娑羅王問佛供養經一卷右元魏興和二年月婆首那鄴城譯出長房録上二經同本別譯菩薩呵色欲經一卷二紙右後秦弘始年羅什於長安譯出內典録菩薩呵色欲經一卷似異羅什譯者第二譯右宋文帝求那跋陀羅譯出長房録上二經同本別譯長者音悅經一卷亦名音悅經亦云長者音悅不蘭迦葉經五紙右吳代支謙譯長者音悅經一卷右宋孝武代沮渠京聲譯出長房録上二經同本別譯勝鬘經一卷亦云勝鬘師子吼一乘大方便經右晉安帝世三藏法師曇摩譯出長房録勝鬘師子吼一乘大方便經一卷二十二紙右宋元嘉年求那跋陀羅於楊都譯出內典録上二經同本別譯不思議光菩薩所說經一卷一名無思議光孩童菩薩經十四紙右西晉竺法護譯出長房録不思議功德經一部四卷或二卷三十七紙右魏齊王世譯一云功德經出長房録無思議光孩童菩薩經一卷亦云不思議光菩薩所問經右後秦弘始年鳩摩羅什於逍遙園譯出長房録以前三經同本別譯惟明二十偈經一卷右吳支謙譯出長房録惟明二十偈經一卷與吳支謙譯者大同小異右晉代竺法護譯出長房録以上二經同本別譯須摩提經一卷一名須摩提菩薩經右西晉竺法護譯出長房録須摩提菩薩經一卷右後秦弘始年鳩摩羅什於逍遙園譯出長房録以前二經同本別譯大方便報恩經七卷右漢代支讖譯出長房録大方便報恩經一部七卷右明二智前五卷說住行令報恩第六卷說佛為眷屬生年日月壽命修短又出不受三歸五戒不得人身出竺道祖録薩婆多記上卷出寶唱録上二經同本別譯楞伽經一部四卷右晉安帝代北涼沙門曇無讖譯出長房録楞伽阿跋多羅寶經一部四卷一百四紙右宋元嘉年沙門求那跋陀羅至楊州道場寺譯出長房録入楞伽經一部十卷二百三紙右後魏延昌二年沙門菩提留支於洛及鄴譯出長房録以前三經同本別譯勝思惟梵天所問經一部六卷第三出一百一十八紙右後魏天平三年沙門菩提留支於洛及鄴譯與晉代法護六卷持心經秦世羅什四卷思益同本異出見內典録持心梵天所問經一部四卷或名等御諸法經或名持心梵天經或名莊嚴佛法經或名持心經一百四紙右西晉太康七年沙門法護譯出長房録思益梵天所問經一部四卷第二出與法護所出勝思惟經本同出異九十四紙右後秦弘始四年沙門羅什於長安逍遙園譯出長房録上三經同本別譯不退轉法輪經一部四卷七十一紙右後秦弘始年沙門鳩摩羅什於長安逍遙園譯見內典録廣博嚴淨不退轉法輪經一部四卷或六卷或名廣博嚴淨亦云不退轉法輪經七十八紙右宋元嘉年沙門智嚴共沙門寶雲於楊都枳園寺譯見長房録上二經同本別譯深密解脫經一部五卷八十三紙右後魏延昌三年沙門菩提留支於洛陽譯見長房録解節經一卷見解深密經第四一品十紙右陳永定元年優禪尼國沙門真諦於廣州制旨王園二寺譯見長房録解脫了義經一部二卷或一卷是深密解脫經前二品二十一紙右宋文帝元嘉十二年沙門求那跋陀羅於楊州東安寺譯見長房録解深密經一部五卷七十三紙右大唐貞觀年沙門玄奘於京師慈恩寺譯見內典録上四經同本別譯大雲密藏菩薩問大海三昧經一卷右西晉惠帝代聶道真譯出長房録大方等無相經一部五卷或四卷一名大雲經右後秦晉孝武帝涼州沙門竺佛念於長安譯出長房録方等大雲經一部六卷或五卷一名大方等無相大雲經一名大雲無相經一名大雲密藏經九十三紙右寶唱録云沙門曇無讖於涼都內苑寺譯出長房録大雲輪經請雨品第一百一卷右周武帝代天和五年三藏禪師闍那耶舍於長安舊城四天王寺譯出長房録大雲請雨經一卷二十一紙右後周沙門闍那共笈多崛多於長安譯見內典録大雲輪請雨經一部二卷是大雲經一百品二十八紙右隋開皇五年沙門那連提耶舍譯出長房録大方等大雲請雨經一卷九紙右隋開皇年沙門闍那崛多及笈多於西京興善寺譯出內典録大雲密藏菩薩請雨經一卷以上八經同本別譯新合金光明經八卷右一部八卷而金光明見有三本初曇無讖譯四卷其次崛多譯為五卷又真諦譯復為七卷其序略云曇無讖法師稱金光明經篇品闕漏每尋文揣義謂此說有徵而酬校無指永懷寤寐梁武帝大同年中敕遣直後張記等屈西天竺優禪尼國三藏法師波羅末陀梁言真諦并齎經論恭膺帝旨太清元年譯諸經目果闕三身分別業障滅陀羅尼最淨地依空滿願等四品今別成為七卷依新來經二百六十部內其間復有銀主陀羅尼品及囑纍品法師譯出沙門彥琮重覆校勘合為八卷品部究足始自乎斯金光明經一部四卷五十六紙右北涼玄始年沙門曇無讖於姑臧譯見長房録金光明經一部七卷或八卷或六卷一百一十五紙右梁世承聖元年沙門真諦於正觀寺及楊雄宅譯見長房録金光明經更廣壽量大辨陀羅尼經一部五卷第二出右周武帝代優婆國沙門耶舍崛多於歸聖寺譯見長房録金光明經囑纍品銀主品合一卷涼曇無讖譯四卷梁真諦譯六卷周崛多譯五卷並無此兩品今故復出之右隋開皇年闍那崛多共達摩笈多於長安興善寺譯出長房録以前五經同本別譯般舟三昧經一部二卷或三卷五十七紙右後漢靈帝光和二年沙門支讖於洛陽譯見長房録般舟三昧經一卷是後十品重翻右後漢代支讖別譯出靜泰法師録般舟三昧經二卷舊録云大般舟三昧經或一卷第二出右漢靈帝天竺沙門佛朔於洛陽譯出長房録般舟三昧經一部二卷四十七紙道安云出般舟三昧經右西晉沙門竺法護譯見長房録般舟三昧念佛章經一卷是般舟經行品右漢代譯出真寂寺録跋陀菩薩經一卷是般舟初四品右出真寂寺録前六經同本別譯如幻三昧經一部二卷或一卷右後漢安世高譯出長房録如幻三昧經一部二卷第二譯與漢世支謙譯般舟三昧二卷本同名及文句小異右東晉西域沙門祇多蜜譯見長房録如幻三昧經一部四卷或三卷或二卷六十六紙右西晉沙門竺法護譯見長房録前三經同本別譯大方等善住意天子問經一部四卷六十八紙右隋大業年達摩笈多於東都上林園翻經館譯出內典録聖善住意天子所問經一部四卷右隋開皇十五年沙門闍那崛多於大興善寺譯出長房録聖善住意天子所問經一部三卷或四卷與竺法護如幻三昧同本異出五十五紙右後魏興和三年沙門瞿曇般若於鄴城譯見長房録前三經同本別譯佛升忉利天為母說法經一部二卷或三卷三十六紙右西晉武帝太康年沙門竺法護於長安譯見內典録導神足無極變化經一部四卷一名合道神足出僧祐録或二卷或三卷第二譯五十一紙右西晉惠帝元康年沙門安法欽於洛陽譯見內典録即是竺法護譯佛升忉利天為母說法經同本別譯文少不同佛升忉利天為母說法經一卷右宋文帝代曇摩蜜多譯出長房録以前三部同本別譯諸法無行經一部二卷三十二紙右後秦弘始三年沙門羅什於長安逍遙園譯見長房録諸法無行經一卷右宋帝代沙門求那跋陀羅譯出長房録諸法本無經一部三卷四十八紙右隋開皇十五年沙門闍那崛多及笈多於大興善寺譯見長房録以前三經同本別譯寶如來三昧經一部二卷一名無極寶經四十紙右東晉沙門祇多蜜譯見長房録無極寶三昧經一卷三十紙右西晉永嘉元年竺法護譯見長房録以前二經同本別譯無量壽經一部二卷右後漢桓帝世沙門安息國王太子安世高於洛陽譯出長房録無量清淨經一部二卷初出亦名無量清淨平等覺經右後漢靈帝從建和至中平年沙門支樓迦讖於洛陽譯見長房録無量清淨平等覺經一部二卷第三出七十紙右前魏高貴鄉公與沙門帛延於洛陽白馬寺譯出長房録三耶三佛薩檀過度人道經一部二卷第二譯長房録云無量壽經右前魏嘉平五年沙門康僧鎧於洛陽白馬寺譯長房云出晉世雜録無量壽經一部二卷第二譯與世高譯少異右魏齊王世嘉平年天竺國沙門康僧鎧於洛陽白馬寺譯出長房録平等覺經一卷右魏代高貴鄉公西域沙門帛延於洛陽白馬寺譯出長房録阿彌陀經一部二卷第三譯出與漢代世高魏僧鎧譯小異五十三紙右吳黃武年中優婆塞支謙譯出長房録無量壽經一部二卷四十六紙第四出與吳世支謙魏康僧鎧帛延出本同文異亦云無量清淨平等覺經右晉永嘉二年沙門竺法護譯出長房録無量壽至真等正覺經一卷一名樂佛土經一名極樂佛土經右東晉元熙元年沙門法力譯出長房録無量壽經一卷一名阿彌陀經五紙右後秦弘始四年沙門鳩摩羅什於長安逍遙園譯出長房録小無量壽經一卷五紙右宋孝建初年沙門求那跋陀羅於楊州祇桓寺譯出長房録新無量壽經一部二卷右宋永初年沙門佛陀跋陀羅譯長房録云東晉譯新無量壽經一部二卷右宋世沙門曇摩蜜多於祇洹寺譯出真寂寺録阿彌陀經一卷五紙右宋文帝代沙門求那跋陀羅譯出長房録無量壽經一部二卷第七譯三十六紙右宋永初二年沙門寶雲於楊州道場寺譯出長房録觀無量壽佛經一卷亦名無量壽觀經十八紙右宋元嘉年沙門彊良