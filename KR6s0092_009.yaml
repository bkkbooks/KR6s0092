body:
  text: 大唐天后敕佛授記寺沙門明佺等撰小乘重譯經目卷之二二百七十九部三百八十一卷出曜經一部十九卷右秦代涼州沙門竺佛念譯出長房録承事勝已經一卷出第十四卷右後漢代安世高譯出長房録斫毒樹復生經一卷出第三卷右後漢代安世高譯出長房録長者夜輸得非常觀經一卷出第十九卷右後漢代安世高譯出長房録七老婆羅門請為弟子經一卷出第一卷右後漢代安世高譯出長房録佛説孤母喪一子經一卷出第二卷右後漢代安世高譯出長房録佛度旃陀羅兒經一卷出第十三卷右後漢代安世高譯出長房録多倒見衆生經一卷出第十六卷右後漢代安世高譯出長房録調達生身入地獄經一卷亦名提婆達生身入地獄經出第十六卷右後漢代安世高譯出長房録佛神力救長者子經一卷出第八卷右後漢代安世高譯出長房録最勝長者受呪願經一卷出第八卷右後漢代安世高譯出長房録良時難遇經一卷出第五卷或第六卷右後漢代安世高譯出長房録求離牢獄經一卷出第四卷右後漢代安世高譯出長房録慈仁不殺經一卷出第七卷右後漢代安世高譯出長房録佛説摩那祇全身入地獄經一卷出第七卷右後漢安世高譯出長房録梵志問世間損減經一卷出第二卷右吳支謙譯出長房録瞎鱉經一卷出第一卷右吳支謙譯出長房録佛説法施勝經一卷出第十五卷右吳代支謙譯出長房録水上泡經一卷出第十六卷右吳代支謙譯出長房録梵志問佛師經一卷出第十四卷右吳代支謙譯出長房録三魚失水經一卷出第二卷右吳支謙譯出長房録梵志子死稻敗經一卷出第六卷右吳支謙譯出長房録佛説護口意經一卷出第七卷右吳代支謙譯出長房録降千梵志經一卷出第五卷右吳支謙譯出長房録甘露道經一卷出第四卷右吳支謙譯出長房録女人欲熾迷荒經一卷出第三卷右西晉竺法護譯出長房録佛説窹意經一卷出第十卷右西晉武帝代法護譯出長房録長壽王經一卷出第十卷右道安云晉代竺法護譯出僧祐録梵志試火恩經一卷出第十卷右道安云晉代竺法護譯出僧祐録佛説歡喜過差天經一卷出第六卷右道安云晉代竺法護譯出僧祐録出曜華經一卷出第十三卷右道安云晉代竺法護譯出僧祐録六師結誓經一卷出第十四卷右道安云晉代竺法護譯出僧祐録無病第一利經一卷出第十五卷右道安云晉代竺法護譯出僧祐録童子問佛乞食事經一卷出第十六卷右道安云晉代竺法護譯出僧祐録乞兒發惡心經一卷出第十八卷右道安云晉代竺法護譯出僧祐録慳貪長者經一卷出第三卷右道安云晉代竺法護譯出僧祐録佛説多聞經一卷出第四卷右西晉代竺法護譯出長房録瓦師逃走經一卷出第一卷右道安云晉代竺法護譯出僧祐録比方世利經一卷出第八卷右西晉惠帝代法炬法立譯出長房録貧子得財發狂經一卷出第三卷右西晉代法炬法立譯出長房録拘提比丘經一卷出第五卷右西晉代法炬法立譯出長房録深淺學比丘經一卷出第四卷或第五卷右西晉代法炬法立譯出長房録放逸經一卷出第四卷右西晉惠帝代沙門法炬法立譯出長房録坐禪比丘命過生天經一卷出第三卷右西晉代法炬法立譯出長房録阿梵和利比丘無常經一卷出第二卷右西晉代法炬法立譯出長房録比丘問佛何故捨世學道經一卷出第二卷右西晉竺法炬法立譯出長房録有衆生三世作惡經一卷出第八卷右西晉惠帝代法炬法立譯出長房録琉璃攻釋子經一卷出第八卷右西晉惠帝代竺法炬共法立譯出長房録佛説信能渡河經一卷出第八卷右西晉惠帝代竺法炬共法立譯出長房録聰明比丘經一卷出第十卷右西晉惠帝代沙門竺法炬共法立譯出長房録説法難值經一卷出第十一卷右西晉惠帝代法炬法立譯出長房録調達問佛顏色經一卷出第十一卷右西晉惠帝代法炬法立譯出長房録佛看病比丘不受長者請經一卷出第二卷右西晉竺法炬法立譯出長房録佛説無常經一卷出第一卷右西晉代法炬法立譯出長房録比丘求證人經一卷出第一卷右西晉惠帝代法炬法立譯出長房録佛説群牛千頭經一卷出第一卷右東晉孝武帝代竺曇無蘭譯出長房録集修行事經一卷出第二卷右東晉竺曇無蘭譯出長房録波利比丘謗梵行經一卷出第七卷右東晉孝武代竺曇無蘭譯出長房録二僑士經一卷出第十卷右宋文帝代求那跋陀羅於荊州新寺譯出長房録目連弟布施望即報經一卷出第十六卷右宋文帝代求那跋陀羅譯出長房録佛命阿難詣最勝長者經一卷出第八卷右宋文帝代求那跋陀羅譯出長房録阿難見伎樂啼哭無常經一卷出第一卷右宋文帝代求那跋陀羅譯出長房録佛往慰迦葉病經一卷出第六卷右宋文帝代元嘉年求那跋陀羅譯出長房録獵師捨家學道經一卷出第三卷右宋孝武帝代沙門慧簡譯出長房録佛説竊為沙門經一卷出第一卷右宋孝武帝代沙門慧簡鹿野寺譯出長房録國王厭世典經一卷出第十二卷昔有二人相愛敬經一卷出第六卷琉璃王入地獄經一卷出第十六卷異象經一卷出第五卷鍾磬貧乏經一卷童子善射術經一卷出第二卷善唄比丘經一卷出第十四卷右已上七十一經是出曜經出以下雜阿含經雜阿含經一部五十卷一百四十四經別一千二百四十紙右宋文帝元嘉年求那跋陀羅於楊州瓦官寺譯出長房録七處三觀經一卷或二卷二十六紙右後漢代安世高譯出長房録九橫經一卷三紙右後漢代安世高譯出長房録八正道經一卷二紙右後漢代安世高譯出長房録五陰譬喻經一卷一名水沫所漂經二紙右後漢代安世高譯出長房録轉法輪經一卷十紙右後漢代安