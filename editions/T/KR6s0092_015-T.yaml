body:
  text: 大唐天后勅佛授記寺沙門明佺等撰偽經目錄二百二十八部四百一十九卷寶頂經一卷南齊永元元年出時年九歲淨土經七卷南齊永元元年出時年九歲正頂經一卷南齊永元元年出時年九歲法華經一卷南齊永元元年出時年九歲勝鬘經一卷南齊永元元年出時年九歲藥草經一卷南齊永元二年出時年十歲太子經一卷南齊永元二年出時年十歲伽耶婆經一卷南齊永元二年出時年十歲波羅㮈經一卷南齊中興元年出時年十二優婁頻經一卷南齊中興元年出時年十二益意經一卷梁天監元年出時年十三般若得經一卷梁天監元年出時年十三華嚴瓔珞經一卷梁天監元年出時年十三出乘師子吼經一卷梁天監三年出時年十五踰陀衛經一卷梁天監四年臺內華光殿出時年十六阿那含經二卷梁天監四年出時年十六妙音師子吼經三卷梁天監四年出時年十六優曇經一卷妙莊嚴經四卷維摩經一卷序七世經一卷右件經凡三十四卷昔有小尼不因師學忽然誦出其名僧法即南齊大學博士江泌之女也隨朝費長房以為熏習有由置於正目仁壽及咸亨等諸目錄皆編在偽部謂非是佛說也今之所撰取則於仁壽等焉善王皇帝經一部二卷一名善王皇帝功德尊經或為一卷像法決疑經一卷善惡因果經一卷蒺梨園經一卷佛說須彌四域經一卷救蟻沙彌經一卷華嚴十惡品經一卷金棺敬福經一卷照明菩薩方便譬喻治病經一卷灌頂度星招魂斷絕復連經一卷定行三昧經一卷一名佛遺之行品摩訶目連所問經唯無三昧經一卷一名唯務三昧大通方廣經一部三卷觀世音十大願經一卷大乘蓮華馬頭羅剎經一卷馬陰藏經一卷一名馬藏光明般若得道經一卷初波羅耀經一部二卷真諦比丘慧明經一卷一名慧明比丘經一名清淨真諦經護身主妙經一卷一名度世護世經大育王經一卷胸有萬字經一卷一名胷現萬字經花鮮經中說罪福經一卷大阿那律經一卷摩訶目連問經一卷一名定行三昧經內三十七品經一卷戒具三昧道門經一卷最妙初教經一卷天竺沙門經一卷應行律經一卷普賢菩薩說證明經一卷大那羅經一卷慧明正行經一卷雨部獨證經一卷大法尊王經一部三十一卷亦名大法王經金剛藏經一部三十一卷十方佛決狐疑經一卷八方根原八十六佛名經一卷彌勒成佛本起經一部七十卷彌勒成佛伏魔經一卷彌勒下教經一卷妙法蓮華度量天地經一卷亦名度量天地經造天地經一卷觀世音詠託生經一卷滅七部莊嚴成佛經一卷照明菩薩經一卷首羅比丘見月光童子經一卷觀月光菩薩記經一卷隨葉佛說須菩提經一部三卷一名須菩提經阿難現變經一卷般若玄記經一卷幽深玄記經一卷玄記經一卷度世不死經一卷大契經一部四卷一云彌勒下生結大善契經或三卷發菩提心經一卷鉢記經一卷五濁惡世經一卷妙法蓮華天地變異經一卷五辛經一卷一云大乘般若五辛經小樓炭經一卷正化內外經一部一卷一名老子化胡經傳錄云晉時祭酒王浮造薩婆若陀眷屬莊嚴經一卷舊錄稱梁天監九年郢州頭陀道人妙光造天皇梵摩經一卷安墓經一卷安冡經一卷齋法清淨經一卷安宅經一卷妙寶車經一卷淮州比丘曇靜撰天公經一卷度生死海神船經一卷度法護經一卷北方禮佛呪經一卷修行方便經一卷偈令經一卷提謂波利經一部二卷舊錄稱宋孝武帝時北國沙門曇靜撰與一卷者邪正大乘呪魅經一卷尸陀林經一卷招魄經一卷太子讚經一卷比丘法藏見地獄變經一卷閻羅王東太山經一卷字論經一卷救護眾生惡疾經一卷一名救疾經五果譬喻經一卷尼吒國王經一卷銀蹄金角犢子經一卷九十五種道經一部二卷或名九十六種外道名同卷小義理乖正阿差末經一部十四卷後母經一卷度人王并庶民受戒正信除邪經一卷相國阿羅呵公經一卷戒果莊嚴經一卷南齊永明年常侍庚頡造四身經一卷異比丘尼戒本一卷覓歷所傳尸利蜜多弟子五龍悔過經一卷一名空惠悔過經異威儀經一卷宋元嘉世曇摩耶舍弟子法度造五濁經一卷五凡夫論一卷大空般若論一卷菩薩善戒比丘藏經戒正信邪經達空道士分別善惡度苦經老子教人服藥修常住經普慧三昧經佛道定行經決定要慧經須彌像圖山經滿子經卷下法王經一卷寶印經佛說決疑經佛說不死經佛說大辯邪正法門經佛性海藏經一部二卷心王菩薩說頭陀經一卷新像法決疑經一卷佛說護身經一卷勝德長者所問菩薩觀行經一卷內天兄弟五人得天品經反流盡源經一卷師子鳩摩羅所問經一卷大方廣不謗佛經一卷本事經一卷無量門淨除三障陀羅尼經一卷三昧經童子菩薩四重問品佛說天地圖像經一卷大乘無盡藏經一卷梵天王經一部二卷側土經一卷彌勒下生經一卷佛說彌勒下生救度苦厄經一卷聖水經一卷佛說四門經一卷佛說父母恩重經一卷菩薩決定經一卷新觀音經一卷佛說延壽經一卷閻羅王經一卷續命經一卷佛說益算經一卷諸佛下生經一部二十卷觀音無畏論一卷佛說四讚偈及七佛名字禮懺經一卷閻羅王說免地獄經一卷佛說花光經一卷三塗累劫不竟經慈教經一卷去惡除病經一卷慈力王經一卷勇意菩薩將僧忍見彌勒并示地獄經寶登王太子經一卷天宮經一卷佛說呪溫疫氣經一卷上舊本下新添折刀經一卷大那羅經一卷五戒本行經一卷佛說修善行經一卷佛說大通菩薩普利廣度經一卷流炭經一卷佛悲海中勇出一如無二行經一卷如來成道經一卷阿彌陀佛覺諸大眾觀身經一卷佛說律藏經一卷佛說救度大劫燒三災起經一卷佛說一乘不假羊鹿經一卷日藏觀世音經一紙半聞善生信迴惡經一卷彌勒下生甄別罪福經一卷大薩若經一卷摩訶薩埵經一卷祕要經一卷清淨精進無上真諦大比丘慧法經一卷佛說五無經一卷佛初置塔經一卷佛說太子成道經一卷十往生阿彌陀佛國經一卷恒伽達緣經一卷寶圖經卷下譬喻折羅漢經一卷降棄魔菩薩經一卷蜜多三昧經一卷發問罪福應報經一卷佛說尼吒國黃羅國經一卷五戒經一卷現報當受經一卷佛說七佛神符經一卷佛說益算神符經一卷右件經古來相傳皆云偽謬觀其文言冗雜理義澆浮雖偷佛說之名終露人謨之狀迷墜群品罔不由斯故具疏條列之如上三階集錄一部四卷三階集錄一部二卷大乘驗人通行法一卷對根淺深發菩提心法一卷末法眾生於佛法內廢興所由法一卷對根淺深同異法一卷學求善知識發菩提心法一卷廣明法界眾生根機法一卷略明法界眾生根機法一卷世間出世間兩階人發菩提心法一卷十種惡具足人迴心入道法一卷行行同異法一卷當根器所行法一卷明善人惡人法一卷就佛法內明一切佛法一切六師外道法二卷三十六種對面不識錯法一卷根機普藥法二卷十大段明義二卷大乘無盡藏法一卷毘發願法一卷人情所行行法一卷大眾制一卷右三階雜法二十二部二十九卷奉證聖元年恩勅令定偽經及雜符籙等遣送祠部進內前件教門既違背佛意別搆異端即是偽雜符籙之限又准聖曆二年勅其有學三階者唯得乞食長齋絕穀持戒坐禪此輒行皆是違法幸承明勅使革往非不敢妄編在於目錄並從刊削以示將來天冊萬歲元年十月二十六日都檢校刊定目錄及經真偽佛授記寺大德僧明佺部檢校刊定經目錄及經真偽大福光寺大德僧道敻大平寺刊定真偽經僧上座福慶刊定真偽經大德僧思言天官寺刊定真偽經僧曇懿大福先寺刊定真偽經僧玄奉佛授記校經目僧智方大白馬寺校經目僧明遠校經目僧法冲校經目僧雲校經目僧承祚校經目僧行光校經目僧宏觀校經目僧元齊校經目僧靈幹校經目僧慧傘校經目僧彥旭校經目僧義宣校經目僧知恩校經目僧明獻校經目僧義貞大福光寺校經目僧審言校經目僧懷琰校經目僧慈訓校經目僧懷感校經目僧義空校經目僧無等校經目僧懷道校經目僧澄性校經目僧彥汪校經目僧惠覺校經目僧貞邃校經目僧惠貞校經目僧待真校經目僧會一校經目僧玄沓校經目僧慧猷校經目僧晞道校經目僧崇彥中大雲寺校經目僧垂幽校經目僧靈濬校經目僧神鸗校經目僧有大校經目僧慧觀大白馬寺校經目僧曇景校經目僧道綽太平寺校經目僧都維那承辦校經目僧休祥校經目僧行充天官寺校經目僧明紹檢校僧大福光寺都維那崇業檢校僧大福光寺主慧澄翻經大德授記寺都維那玄疑翻經大德崇光寺都維那文徹翻經大德中大雲寺都維那象城縣開國公玄範翻經大德佛授記寺主昌平縣開國公德感翻經大德大白馬寺都維那義合翻經大德大福光寺都維那豫章縣開國公惠儼翻經大德長壽寺主智㶑翻經大德佛授記寺文才翻經大德大慈恩寺英芝翻經大德大福光寺波崙翻經大德大福光寺復禮翻經大德荊州王泉寺弘景翻經大德崇先寺上座法寶翻經大德佛授記寺神英翻經大德大福光寺圓測漢三藏翻經大德大福光寺義淨婆羅門翻經三藏法師菩提留志婆羅門翻經三藏法師寶思惟武周刊定偽經目錄
