body:
  text: 大乘單譯經目二百八十三部五百二十五卷佛印三昧經一卷右後漢代安世高譯出長房録卒逢賊結帶呪經一卷右後漢代安世高譯出長房録呪賊經一卷一名除辟賊害呪右後漢代安世高譯出長房録十四意經一卷右後漢代安世高譯出僧祐録寶積三昧文殊問法身經一卷一名惟日寶積三昧文殊師利問法身經六紙右後漢代安世高譯出長房録明度五十校計經一部二卷一名五十校計經四十四紙右後漢元嘉年安世高譯出長房録四百三昧名經一卷右後漢代安世高譯出長房録蓮花女經一卷右後漢代安世高譯出長房録大乘方等要慧經一卷一紙右後漢代安世高譯出長房録人本欲生經一卷右後漢桓帝永壽二年安世高譯出長房録迦葉結經一卷九紙右後漢代安世高譯出長房録文殊師利問菩薩經一卷一名問署經二十紙右後漢代靈帝支讖譯出長房録光明三昧經一卷右後漢代支樓迦讖譯出長房録內六波羅蜜經一卷右後漢代靈帝清信士嚴佛調譯出長房録摩訶精進經一卷一名大精進經右魏文帝代支謙譯出長房録陀羅尼句經一卷右魏代支謙譯出長房録鹿子經一卷右吳建興年支謙譯出長房録金剛三昧本性清淨不壞不滅經一卷一名金剛清淨經八紙右吳建興年支謙譯出達摩鬱多羅録華積陀羅尼經一卷三紙右吳建興年支謙譯出寶唱録十二門大方等經一卷右吳黃武年支謙譯出長房録九色鹿經一卷三紙右吳代支謙譯出達摩鬱多羅録佛從上所行三十偈經一卷或無經字右吳黃武年支謙譯出長房録菩薩生地經一卷一名差摩竭經九紙右吳黃武年支謙譯出長房録出家功德經一卷六紙右吳時支謙譯出長房録出家功德經一卷二紙文殊師利菩薩經一卷右西晉代竺法護譯出長房録三歸五戒神王名經一卷右道安云西晉代法護譯出僧祐録十方佛名功德經一卷右西晉竺法護譯出長房録十方佛名經一卷右西晉竺法護譯出長房録慈仁問八十種好經一卷或直云八十種好經右西晉竺法護譯出長房録菩薩三十二相經一卷一云三十二相因緣經右西晉竺法護譯出長房録嚴淨定經一卷一名序世經右晉代竺法護譯出長房録寶施女經一卷一名須摩提法律三昧經右晉代竺法護譯出長房録金益長者子經一卷右西晉代竺法護譯出長房録離垢蓋經一卷右西晉代竺法護譯出長房録慧明經一卷右西晉代竺法護譯出長房録心明經一卷三紙一名心明女梵志婦飯汁施經右西晉竺法護譯出達摩鬱多羅録幻士仁賢經一卷十八紙右西晉代竺法護譯出長房録等目菩薩所問三昧經一部三卷或二卷一名普賢菩薩定意經六十三紙右西晉竺法護譯出內典録菩薩夢經一部二卷四十紙右西晉大安年竺法護譯出達摩鬱多羅録衆祐經一卷右晉代竺法護譯出長房録十等藏經一卷一名三轉月明經右晉代竺法護譯出長房録密迹金剛力士經一部五卷或八卷一百三十二紙右晉太康元年竺法護譯出內典録決道俗經一卷右晉代竺法護譯出長房録殖衆德本經一卷右晉代竺法護譯出長房録魔逆經一卷二十二紙初出右西晉太康年竺法護譯出長房録彌勒菩薩所問本願經一卷一名彌勒菩薩本願經一名彌勒菩薩難經九紙右西晉代竺法護譯出內典録日明經一卷三紙右西晉代竺法護譯彌勒為女身經一卷一名彌勒菩薩為女身經右西晉代竺法護譯出長房録濟諸方等學經一卷十四紙右西晉代竺法護譯出長房録雜呪經一部三卷右西晉代竺法護譯出長房録猛施經一卷一名猛施道地經右西晉代竺法護譯出長房録阿惟越致遮經一部三卷或四卷或名阿惟越致經或名不退轉法輪經七十七紙右西晉太康年沙門竺法護譯出長房録決定總持經一卷十紙一名決定總經一名決總持經右西晉代竺法護譯出長房録滅十方冥經一卷初出一本無滅字六紙右西晉代光熙元年竺法護譯出長房録鹿母經一卷四紙右西晉代竺法護譯出長房録八陽神呪經一卷一名八陽經三紙右西晉代竺法護譯出長房録定意三昧經一卷右道安云晉代竺法護譯出僧祐録五十三佛名除罪經一卷出藥王藥上如來藏經右道安云吳代竺法護譯出僧祐録出要經一部二十卷右道安云晉代竺法護譯出僧祐録師子月佛本生經一卷七紙右西晉代惠帝太安年竺法護譯出達摩鬱多羅録有稱十方佛名得多福經一卷右道安云西晉代竺法護所出見僧祐録十方佛名滅罪經一卷右道安云西晉代竺法護譯出僧祐録德內豐嚴王佛名經一卷右道安云西晉代竺法護譯出見僧祐録功德寶光菩薩問護持經一卷右道安云西晉代竺法護出見僧祐録菩薩十住行道品經一卷右道安云西晉代竺法護出見僧祐録華嚴淨經一卷右道安云西晉代竺法護出見僧祐録浮木譬喻經一卷右道安云西晉代竺法護出見僧祐録陀羅尼偈經一卷右道安云西晉代竺法護出見僧祐録目連上淨居天經一卷一本無天字出本行右西晉代竺法護譯出長房録普首童真經一卷右西晉代竺法護譯出長房録大光明菩薩百四十願經一卷右西晉惠帝太康年聶道真譯出長房録寂音菩薩願經一卷右西晉惠帝代聶道真譯出長房録三曼陀颰陀羅菩薩經一卷八紙右西晉惠帝代元康年聶道真譯出長房録菩薩苦行經一卷右西晉惠帝大康年聶道真譯出長房録菩薩呵睡眠經一卷右西晉惠帝代太康年聶道真譯出長房録異出菩薩本起經一卷或無起字右西晉惠帝代聶道真譯出長房録菩薩呵家過經一卷右西晉惠帝代太康年聶道真譯出長房録菩薩如意神通經一卷右西晉惠帝代聶道真譯出長房録菩薩求五目法經一卷右西晉惠帝代聶道真譯出長房録