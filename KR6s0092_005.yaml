body:
  text: 大唐天后敕佛授記寺沙門明佺等撰大乘重譯經目卷之四一百六十八部三百六十五卷首楞嚴經一部二卷初出右漢靈帝中平三年支樓迦讖於洛陽譯出長房録首楞嚴經一部二卷第二譯右曹魏甘露年帛延於洛陽白馬寺譯出長房録方等首楞嚴經一部二卷第三譯右吳黃武年支謙譯出長房録首楞嚴經一部二卷右晉代竺法護譯出長房録勇伏定經一部二卷第四出右晉元康年竺法護譯與支謙支讖帛延所出首楞嚴本同名異文少別首楞嚴經一部八卷第六出右西晉永寧年支敏度合兩支兩竺一帛五本為一部見支敏度録首楞嚴經一部二卷第五譯三十六紙右晉惠帝元康年竺叔蘭於洛陽譯出長房録首楞嚴三昧經一部三卷或云首楞嚴經第七譯五十八紙右秦弘始年羅什於長安譯出長房録蜀首楞嚴經一部二卷右魏齊王世譯出長房録後出首楞嚴經一部二卷右魏齊王世譯出長房録以前十經同本異譯空寂菩薩所問經一卷亦云法滅盡經亦云法沒盡經右吳黃武年支謙譯出長房録初出法滅盡經一卷第三出或云法沒盡經又云空寂菩薩所問經與吳代支謙出者同右晉代竺法護譯出長房録小法沒盡經一卷右晉代竺法護譯出長房録法沒盡經一卷第二出右東晉祇多蜜譯出長房録以前四經同本異譯大方等如來藏經一卷一名佛藏方等經二十紙右西晉惠帝代法炬共法立洛陽譯出化度録大方等如來藏經一卷第二出右東晉義熙年佛陀跋陀羅於楊都及廬山譯出長房録大方等如來藏經一卷右西晉惠帝代河內沙門白法祖譯出長房録大方廣如來祕密藏經一部二卷二十四紙以前四經同本異出成具光明定意經一卷或云成具光明經一云成具光明三昧經二十六紙右後漢靈帝光和二年支曜於洛陽譯出長房録成具光明三昧經一卷右後漢支讖譯出吳録及三藏記稱揚諸佛功德經一部三卷六十七紙右西晉竺法護譯出長房録稱揚諸佛功德經一部三卷一名佛華經一名集華經一名見在佛名經亦名諸佛華經第三譯右後魏沙門吉迦夜於北臺譯出長房録稱揚諸佛功德經一部三卷一名集華經六十七紙右秦弘始七年羅什於長安譯出長房録現在佛名經一部三卷一名華敷經右宋元嘉二十九年沙門求那跋陀羅於荊州譯出寶唱録以前六經同本別譯鴦崛摩羅經一卷一名指鬘經一名鴦崛髻經右晉武帝竺法護譯出長房録鴦掘魔悔過經一卷右道安云竺法護所出出僧祐録佛說鴦掘魔羅母因緣經一卷右道安云晉代竺法護所出出僧祐録無量樂國土經一卷右道安云竺法護譯出僧祐録帝釋施央崛魔羅法服經一卷右道安云晉代竺法護所出出僧祐録佛降央崛魔羅人民歡喜經一卷央崛魔羅歸化經一卷一名央崛魔婦死經右並西晉惠帝法炬法立譯出長房録央崛魔羅經一部四卷九十二紙右宋文帝元嘉年求那跋陀羅於道場寺譯出長房録以前八經同本別譯須賴經一卷初出右前魏帛延於洛陽白馬寺譯出長房録須賴經一卷第二譯或名須賴菩薩經二十紙右吳黃武年支謙譯出長房録德光太子經一卷一名須賴問德光太子經一名賴吒和羅所問光德太子經十九紙右西晉太始六年竺法護譯出長房録貧子須賴經一卷右宋代文帝求那跋陀羅譯出長房録以前四經同本別譯慧印三昧經一卷亦名慧印經亦云十方現在佛悉在前立定經亦名寶田慧印三昧經二十三紙右吳建興至黃武年支謙譯出長房録如來智印經一卷十九紙右二經同本異譯須真天子經一部二卷或名須真天子問四事經右西晉太始二年竺法護於白馬寺譯出長房録須真天子經一卷見吳録又云羅什出似再譯右北涼代沙門曇無讖譯出長房録以前二經同本別譯月燈三昧經一卷出大月燈三昧經右漢代安世高譯出長房録月燈三昧經一卷一名文殊師利十事行經一名建慧三昧經十紙右宋代沙門先公譯出長房録月燈三昧經一部十一卷或十卷二百二紙右高齊天保八年沙門耶舍共法智於相州譯出長房録以前三經同本別譯道樹經注解一卷并序右魏齊王世正始年康僧會譯出長房録道樹三昧經一卷一名私訶末經一名菩薩道樹經十一紙右吳黃武年支謙譯出寶唱録道樹三昧經一部二卷右出釋道安支敏度録以前六經同本別譯照明三昧經一卷七紙右晉代竺法護譯出長房録照明三昧經一卷十紙第二譯右東晉代耆多蜜譯出長房録以前二經同本別譯超日明三昧經一部二卷一名超日明經或三卷初譯五十五紙右西晉太始七年竺法護譯出長房録超日月經一部二卷第二譯右晉聶承遠重飾與法護出超日明經同本異譯出長房録以前二經同本異譯孔雀王雜神呪經一卷右東晉沙門帛尸利蜜多譯出長房録孔雀王神呪經一部二卷或一卷右東晉咸康年沙門帛尸利蜜多譯出長房録孔雀王呪經一卷異前吉夜譯者第二出右東晉孝武帝曇無蘭譯大金色孔雀王經一卷并結界場法具右秦羅什於長安逍遙園譯出長房録孔雀王陀羅尼經一部二卷三十七紙右梁天監十五年僧伽婆羅楊都占雲館及止觀寺譯出長房録以前五經同本異出請觀世音經一卷一名請觀世音消伏毒害陀羅尼呪經出寶唱録右後秦弘始年鳩摩羅什於長安逍遙園譯出長房録請觀世音銷伏毒害經一卷第二出十四紙右東晉代竺難提譯出內典録以前二經同本別譯大淨法門經一卷一名上金光首女所問儒首童真所開化經一名淨法門經二十九紙右西晉建興元年竺法護譯出內典録大莊嚴法門經一部二卷與文殊師利神力經勝金色光明德女經大淨法門經同本別譯二十六紙右隋開皇三年北天竺烏長國三藏那連提耶舍於大興善寺譯見內典録以前二經同本別譯菩薩睒子經一卷五紙佛說睒經一卷一名睒本起經右後秦羅什譯出長房録睒子經一卷一名孝子睒經一名菩薩睒經一名佛說睒經一名孝子隱經一名睒本經第二譯七紙右西秦法堅於河南國為乞伏乾歸譯出長房録睒本經一卷右秦羅什於長安逍遙園譯出長房録孝子睒子經一卷一名孝睒經一名菩薩睒經一名佛說睒經一名睒本經一名孝子德經凡六名第二出與羅什譯少異右西秦法堅於河南國譯出長房録以前五經同本別譯光世音大勢至受決經一卷右西晉元康年竺法護譯出長房録觀世音受記經一卷右晉惠帝聶道真譯出長房録觀世音菩薩受記經一卷一名觀世音受決經出寶唱録再譯右宋永初元年曇無竭於楊州譯出長房録以前三經同本異譯菩薩修行經一卷一名威施長者所問菩薩經一名長者修行經七紙右前魏甘露年帛延於洛陽譯出長房録菩薩修行經一卷右吳代支謙譯出長房録長者修行經一卷一名威施長者所問菩薩修行經一名菩薩修行經右晉惠帝河內沙門白法祖譯出長房録以前三經同本異出菩薩本行經一部三卷五十二紙菩薩本行經一卷右西晉惠帝太康年聶道真譯出長房録以前二經同本別譯菩薩藏經一部三卷右晉竺法護譯出長房録菩薩藏經一部三卷一名富樓那問經一名大悲心經或二卷七十三紙右秦弘始年羅什於長安譯出長房録大菩薩藏經一部二十卷四百一十紙右唐貞觀十九年三藏玄奘於西京弘福寺譯出內典録具善根經一卷出菩薩藏下卷右道安云晉代竺法護譯出僧祐録以前四經同本別譯菩薩行五十緣身經一卷亦云五十緣身經又云菩薩緣身五十事經七紙右西晉竺法護譯出長房録菩薩緣身五十事經一卷與五十緣行經大同小異右西晉太康年聶道真譯出長房録以前二經同本異譯諸德福田經一卷初出亦直云福田經右西晉惠帝沙門法立譯出長房録福田經一卷一云諸德福田經一名福田地經第二出六紙右西晉竺法炬譯出長房録福田經一卷一名居士請僧福田經右晉安帝代曇無讖譯出長房録以前三經同本異出太子墓魄經一卷右後漢安世高譯出長房録太子墓魄經一卷五紙右西晉竺法護第二譯出長房録以前二經同本異譯太子和休經一卷四紙右吳支謙譯出達摩鬱多羅録太子刷護經一卷五紙右道安云晉代竺法護譯出僧祐録以前二經同本大阿育王經一部五卷右西晉惠帝代光熙年安息國沙門安法欽於洛陽譯大阿育王經一部十卷或無大字右梁天監十一年沙門僧伽婆羅於楊都壽光殿帝自執筆譯出長房録以前二經同本別譯大摩耶經一部二卷或一卷右後漢靈帝中平年支曜於洛陽譯出長房録摩訶摩耶經一卷或二卷二十五紙右南齊曇景於楊都譯出內典録以前二經同本別譯七佛神呪經一卷結縷者異本一本或無經字右吳代支謙譯出長房録七佛神呪經一部四卷七十一紙以前二經同本別譯造立形像福報經一卷二紙大乘造像功德經一部二卷或一卷二十二紙右大周天授二年提雲般若於大周東寺譯以前二經同本法界體性無分別經一部二卷三十一紙右天監年僧伽曼陀羅於楊都譯出長房録法界體性無分別經一部二卷三十六紙右一本羅什譯出達摩鬱多羅録以前二經同本別譯未曾有因緣經一部二卷四十八紙右秦弘始年羅什於長安譯出達摩鬱多羅録未曾有因緣經一部二卷一名未曾有因果經四十八紙右南齊曇景於楊都譯出長房録以前二經同本別譯四不可得經一卷右後漢代安息國王子世高譯出長房録四不可得經一卷第二出六紙右西晉沙門竺法護譯與世高譯同出長房録以前二經同本異譯濡首菩薩經一卷一名決了諸法如幻三昧經三十二紙右漢代譯濡首菩薩無上清淨分衛經一部二卷一名決了諸法如幻三昧經三十二紙右漢靈帝臨淮清信士嚴佛調於洛陽譯出長房録濡首菩薩無上清淨分衛經一部二卷一名決了諸法如幻三昧經三十三紙右宋代翔公於南海郡譯出內典録以前三經同本別譯除恐災患經一卷十五紙右魏世帛延譯出長房録除恐災患經一卷右西秦孝武世沙門聖堅譯出長房録以前二經同本別譯益意經一部三卷第二譯右東晉太元末康道和譯出竺道祖録益意經一卷亦名思意經右漢靈帝代臨淮清信士嚴佛調譯出長房録益意經一部二卷右僧法尼譯出朱士行漢録以前三經同本別譯首意女經一卷一名梵女首意經六紙右西晉竺法護譯出內典録梵女首意經一卷右宋代沙門釋勇公譯出長房録以前二經同本別譯孛本經一部二卷第一譯右漢代沙門支讖譯孛經一部二卷第二出右吳支謙譯出內典録孛經一卷右西秦沙門聖堅於河南國為乞伏乾歸譯出長房録以前三經同本異出無量義經一卷右宋文帝求那跋陀羅譯出長房録無量義經一卷二十一紙右南齊建元中曇摩伽陀耶舍於廣州朝廷寺譯出長房録以前二經同本別譯淨度三昧經一卷右後魏和平三年釋曇曜譯出長房録淨度三昧經一卷右宋元嘉四年釋智嚴譯出長房録淨度三昧經一部二卷右宋代沙門寶雲於楊州譯出長房録淨度三昧經一部三卷右宋求那跋陀羅譯出長房録以前四經同本別譯後出阿彌陀偈一卷一紙阿彌陀佛偈一卷以前二經同本別出摩訶剎頭經一部二卷灌佛經一卷與剎頭經大同小異右西秦沙門聖堅譯出長房録灌經一卷亦云四月八日灌經右西晉惠帝沙門法炬法立譯出長房録以前三經同本別譯佛本行經一卷右梁僧祐師録云古典經出長房録佛本行經一部五卷第二出右北梁沮渠世曇無讖譯出長房録佛本行經一部七卷一百一十四紙右宋元嘉年釋寶雲於楊都譯出內