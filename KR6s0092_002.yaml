body:
  text: 天后敕佛授記寺沙門明佺等撰大乘重譯經目卷之一一百八十部一千三百九十卷大方廣佛花嚴經一部六十卷或五十卷一千八十七紙右東晉義熙十四年沙門佛陀跋陀羅於楊州道場寺譯出長房録兜沙經一卷五紙右後漢中平年支讖於洛陽譯出長房録菩薩本業經一卷一名本業經十三紙右吳黃武年優婆塞支謙譯是華嚴經淨行品無偈出長房録淨行品經一卷一名菩薩本業經右吳代支謙譯出長房録漸備一切智功德經一部五卷一百二十二紙右西晉元康七年沙門竺法護譯是華嚴經十地品出長房録大方廣十地經一卷一名菩薩十地經亦云十地經七紙右西晉代竺法護譯是華嚴十住品出長房録大方廣菩薩十地經一卷右西晉惠帝代河內沙門白法祖譯出長房録佛說金剛藏問菩薩行經一卷右西晉代竺法護於長安譯出長房録度世品經一部六卷一百一十九紙右西晉元康元年沙門竺法護譯是華嚴經離世間品出長房録菩薩十住經一卷五紙右西晉沙門竺法護譯是華嚴經十住品出長房録如來興顯經一部四卷一名興顯如幻經七十七紙右西晉元康年沙門竺法護譯是華嚴經性起品出長房録諸菩薩求佛本業經一卷是華嚴經淨行品十一紙右西晉惠帝太康年清信士聶道真譯出長房録十住經一部十二卷右西晉惠帝太康年聶道真譯出長房録大方廣菩薩十地經一卷右西晉惠帝太康年清信士聶道真譯與法護譯大同小異出長房録菩薩十住經一卷第三出右東晉安帝世北天竺國三藏禪師佛馱跋陀羅譯出長房録菩薩本業經一卷是淨行品重翻長房録云本業經右東晉佛陀跋陀羅譯出靜泰録菩薩十法住經一卷右東晉世沙門佛陀跋陀羅譯是華嚴十住品長房録云晉惠帝太康年清信士聶道真譯十地經一卷右東晉祇多蜜譯出長房録菩薩十住經一卷第二出右東晉代祇多蜜譯出長房録十住經一部四卷或五卷九十七紙右後秦弘始年沙門羅什共佛陀耶舍譯出長房録莊嚴菩提心經一卷第二譯與晉法護出菩薩十地品大同小異右後秦弘始年沙門羅什譯出長房録羅摩伽經一部三卷或四卷七十四紙右西秦沙門堅公譯又云曹魏安法賢譯是華嚴經入法界品出內典録羅摩伽經一卷與魏代安法賢譯者廣略為異右北涼代曇無讖譯出長房録大方廣菩薩十地經一卷第二出與晉法護所出菩薩十地經小異右元魏代延興年沙門吉迦夜於北臺譯是華嚴十住品前出長房録信力入印法門經一部五卷九十三紙右元魏正始年沙門曇摩流支於洛陽譯是華嚴經出內典録佛華嚴入如來不思議境界經一卷或二卷二十八紙右隋開皇年沙門闍那崛多共笈多於西京興善寺譯出長房録大方廣佛華嚴經續入法界品一卷十一紙右大唐垂拱元年沙門地婆訶羅於西京西太原寺譯新編入録大方廣佛華嚴經不思議佛境界分一卷或二卷十三紙右大唐永昌元年于闐沙門提雲般若於神都魏國東寺譯新編入録大方廣佛華嚴經修慈分一卷九紙右大周天授二年于闐沙門提雲般若於神都大周東寺譯新編入録大方廣如來性起經一部二卷一名大方廣如來性微密藏經五十一紙華嚴經十種生法經一卷佛名經一卷菩薩名經一卷抄華嚴經一卷十地經一部四卷是十地品漸備經一卷以前三十六經並華嚴經枝派大般若波羅蜜多經一部六百卷一萬二千紙右大唐顯慶四年三藏玄奘於方州玉華宮譯此一部經具單重合譯道行般若經一部十卷一百九十四紙右後漢光和二年沙門支樓迦讖於洛陽譯出長房録是小品經古品曰遺日說般若經一卷一名佛遺日摩尼寶經一名摩訶衍寶嚴經一名大寶積經二十五紙正右後漢桓帝建初年沙門支樓迦讖於洛陽譯出長房録道行經一卷右後漢嘉平年沙門竺佛朔譯出後漢朱士行録大明度經一部四卷或六卷或名大明度無極經一百六紙右吳黃武年優婆塞支謙於涼州譯出長房録摩訶般若波羅蜜呪經一卷右吳建興年優婆塞支謙譯出長房録吳品經一部五卷亦名大智度無極經即是小品般若右魏齊王世吳赤烏年沙門康僧會譯出僧祐及長房二録佛遺日摩尼寶經一卷十九紙右西晉竺法護譯出長房録新道行經一部十卷或七卷第二出亦名小品出光讚般若一百八十五紙右西晉太始年沙門竺法護於洛陽及江左譯出長房録仁王般若經一部二卷或一卷三十一紙右西晉永嘉年沙門竺法護譯出晉世雜録小品經一部七卷第二譯右西晉太始四年竺法護於洛陽譯出長房録與漢世竺佛朔譯舊道行全異光讚般若經一部十五卷或十卷二百五十一紙右西晉太康七年沙門竺法護於長安譯出長房録大智度無極經一部四卷義善寺録云出大品右道安云晉代竺法護譯出僧祐録放光般若經一部三十卷或二十卷五百三十紙右西晉元康元年沙門無羅叉等於陳留倉垣譯出內典録摩訶般若波羅蜜道行經一部二卷或直云道行右西晉惠帝代優婆塞衛士度譯出寶唱録大智度經一部四卷義善寺録云出大品右東晉沙門祇多蜜譯出長房録摩訶般若波羅蜜經鈔長安品五卷一名須菩提品一名長安品經八十三紙右前秦建元年沙門曇摩蜱共竺佛念譯出內典録放光般若波羅蜜經一部二十卷第二譯右後秦弘始年鳩摩羅什於長安逍遙園譯出長房録仁王般若經一部二卷第二出與法護出者文少異右秦弘始三年沙門鳩摩羅什於長安逍遙園譯出長房録金剛般若波羅蜜經一卷舍衛十三紙右後秦弘始三年沙門羅什於長安逍遙園譯出長房録摩訶般若波羅蜜經一部三十卷或四十卷或二十七卷六百一十九紙右後秦弘始五年沙門鳩摩羅什於長安逍遙園譯出長房録小品般若波羅蜜經一部十卷或七卷或八卷菩提經同本異出一百五十四紙右後秦弘始十年沙門羅什於長安逍遙園譯出長房録大明度經一部四卷一百六紙右北涼沙門道龔於西源譯出長房録金剛般若經一卷婆伽婆十六紙右後魏永平二年沙門菩提留支於洛都譯出內典録文殊般若波羅蜜經一卷或二卷又加說字二十四紙右梁天監年沙門曼陀羅於楊州譯出長房録文殊師利所說般若波羅蜜經一卷右經第二譯少勝前曼陀羅所出二卷者梁天監年扶南沙門僧伽婆羅譯出長房録仁王般若經一卷右梁武帝世大同三年優禪尼國沙門真諦於寶月寺譯出長房録與晉世法護譯者少異勝天王般若經一部七卷一百二十四紙右陳世天嘉六年月支國王子月婆首那於江州興業寺譯又弘福等録云楊州譯出長房録金剛般若經一卷祇樹林十四紙右陳朝永定年沙門真諦於廣州制旨王園二寺譯出長房録寶積經一部三卷右周武帝代三藏禪師闍那耶舍於長安四天王寺譯出長房録能斷金剛般若經一卷二十一紙右唐永徽年沙門玄奘於西京大慈恩寺譯出內典録實相般若經一卷九紙右大周長壽二年沙門菩提留志於神都大周東寺譯摩訶衍寶嚴經一卷二十紙右長房録云晉代譯大寶積經一卷一名大寶經一名寶經一名摩尼寶經二十紙右內典録云與支讖佛遺日寶及摩訶衍寶嚴經同本異譯般若波羅蜜神呪經一卷出大品經總攝無盡義經一部二卷出大品經以前三十六經竝般若枝分新合大集經六十卷右招提寺沙門釋僧就開皇六年新合長房録云就少出家專寶坊學依如梵本此大集經凡十萬偈若具足出可三百卷見今譯經崛多三藏口每說云于闐東南二千餘里有遮拘迦國彼王純信敬重大乘諸國名僧入其境者並皆試練若小乘學即遣不留摩訶衍人請停供養王宮自有摩訶般若大集華嚴三部大經並十萬偈然去聖將遠凡識漸昏不能總持隨分撮寫致來梵本部甲弗全略五略翻廣來廣譯緣是前哲支曇所翻及羅什出或二十七或復三十或三十一卷軸匪定就既宣楊每恆笑歎及耶舍高齊之世出月藏經一十二卷至今開皇復屬耶舍譯日藏經一十五卷既竝大集本舊品內誠欣誠躍即依合之成六十軸舍利弗問寶女經一卷出第二卷右後漢安世高譯出長房録申越長者悔過供佛經一卷亦名由起長者悔過經右後漢代安世高譯出長房録舍利弗歎寶女說不思議經一卷一名歎寶女經右後漢代安世高譯出長房録八光經一卷右後漢代安世高譯出長房録大方等大集經一部二十七卷右後漢建和年月支國沙門支婁迦讖於洛陽初譯出長房録阿差末經一部四卷初譯一名阿差末菩薩經右吳黃武三年天竺沙門維祇難於武昌譯出長房録大慈無減經一卷右吳代支謙譯出長房録小阿差末經一部二卷右吳黃武年優婆塞支謙譯出長房録阿差末經一部四卷第二譯與維耆難所譯本小異右吳黃武年優婆塞支謙譯出長房録寶女問三十二相經一卷一云寶女問經一名三十二事經一名問經右吳代優婆塞支謙譯出長房録魔女聞佛說法得男身經一卷出大集右吳黃武年優婆塞支謙譯出長房録魔女問得男身經一卷右吳赤烏年康僧會異譯寶幢分往古品末出寶唱録菩薩淨行經一部二卷右吳赤烏年沙門康僧會於建鄴譯是大集寶髻品出竺道祖録魔王入苦宅經一卷右道安云晉代竺法護譯出僧祐録波斯匿王蒙佛神力到寶坊經一卷右道安云晉代竺法護譯出僧祐録十八不共品經一卷右道安云晉代竺法護譯出僧祐録明星天子問慈經一卷右道安云晉代竺法護譯出僧祐録梵王變身經一卷右西晉竺法護譯出長房録四自在神通經一卷右西晉竺法護譯出長房録大哀經一部八卷或七卷或六卷一百二十七紙右西晉元康年沙門竺法護於長安譯是大集自在王陀羅尼品出長房録寶結菩薩所問經一部二卷一名菩薩淨行經四十八紙右西晉太熙年沙門竺法護譯是大集寶髻品出長房録無盡意經一部四卷或五卷第二出與阿差末同本別譯八十六紙右西晉太始年沙門竺法護於長安譯出長房録寶女問慧經一卷第二譯與吳世支謙出者同出四卷寶女經右西晉竺法護譯出長房録無言菩薩經一部二卷或名無言童子經四十一紙右西晉沙門竺法護譯是大集經無言品出聶道真録寶女問慧經一部四卷或三卷或名寶女經亦名寶女三昧經六十三紙右晉太康八年沙門竺法護於長安譯是大集經寶髻菩薩品出聶道真録阿差末經一部七卷或四卷第三出或云差末菩薩經一百六紙右晉永嘉年沙門竺法護於長安譯是大集經無盡意品出見長房録光味菩薩造七寶梯經一卷右西晉元康年惠帝代聶道真譯出長房録無言菩薩流通法經一卷出第十七卷右西晉惠帝代聶道真譯出長房録菩薩道示行經一卷出第三卷右西晉惠帝代聶道真譯出長房録無言菩薩經一卷或云無言童子經或二卷四十一紙右西晉惠帝世聶道真譯出長房録菩薩初發心時經一卷右西晉惠帝太康年聶道真譯出長房録菩薩出要行無礙法門經一卷出第十二卷右西晉聶道真譯出長房録菩薩戒身自在經一卷或云自在王菩薩問如來警戒經右西晉惠帝太康年聶道真譯出長房録菩薩戒自在經一卷右西晉惠帝世太康年聶道真譯出長房録佛問四童子經一卷右西晉惠帝世河內沙門白法祖譯出長房録調伏王子道心經一卷右西晉惠帝世河內沙門白法祖譯出長房録魔女聞佛說法得男身經一卷第二譯與先譯弊摩試目連經本同名異右西晉惠帝世沙門法炬法立譯出長房録諸天問如來境界不可思議經一卷右東晉孝武帝代竺曇無蘭譯出長房録見水世界經一卷右東晉孝