body:
  text: 大周刊定衆經目録序大唐天后敕佛授記寺沙門明佺等撰竊以真諦俗諦藉文字而方顯正法像法由護持而獲存所以得萬劫流通四生利益我大周天策金輪聖神皇帝陛下道著恆劫位鄰上忍乘本願而下生演大悲而廣濟金輪騰轉化偃四洲寶馬飛行聲覃八表莫不齊之以五戒十善運之以三乘六度帝王能事畢踐無遺菩薩法門周行莫怠紹隆之意與金剛而等堅弘誓之心共虛空而比大聖情以教為悟本法是佛師出苦海之津梁導迷塗之眼目務欲令疑偽不雜住持可久乃下明制普令詳擇存其正經去其偽本謹按梁朝釋僧皎釋僧祐釋寶唱隋朝僧法經等所撰一切經目録隋朝翻經學士費長房所撰開皇三寶録唐朝僧道宣所撰內典録等已編入正目大小乘經律論并賢聖集傳合二千一百四十六部六千二百三十五卷其後唐朝至聖朝新譯經論及有雖是前代舊翻而未經入目并雖已入目而錯注疑偽審共詳挍事須改正者前後三件大小乘經律論合一千四百七十部二千四百六卷悉依明旨咸編正目今新入正目及舊入正目大小乘經律論并賢聖集傳都合三千六百一十六部八千六百四十一卷其間有名闕本有本失譯見行入藏及翻譯單重三藏不同兩乘各異並備出條件撰為目録合一十四卷號之曰大周刊定衆經目録其偽經既不是正經偽目豈同於正目編之卷次竊將未允然恐須明示遠近故別為一軸傳寫焉大小乘經律論及賢聖集傳合三千六百一十六部八千六百四十一卷其見定入藏流行部卷不在此數大乘單譯經目卷第一二百八十三部五百二十五卷大乘重譯經目之一卷第二一百八十部一千三百九十卷大乘重譯經目之二卷第三一百六十八部三百三十八卷大乘重譯經目之三卷第四一百八十部四百二十一卷大乘重譯經目之四卷第五一百六十八部三百六十五卷大乘律大乘論目卷第六一百五十二部七百一十六卷小乘單譯經目卷第七三百二十三部四百一十九卷小乘重譯經目之一卷第八三百七十七部八百四十六卷小乘重譯經目之二卷第九二百七十九部三百八十一卷小乘律論賢聖集傳卷第十一百九十四部一千三百四十一卷大小乘失譯經目卷第十一四百二十四部六百三十六卷大小乘闕本經目卷第十二八百八十八部一千二百六十三卷見定入藏流行目上卷第十三見定入藏流行目下卷第十四
