body:
  text: 大唐天后敕佛授記寺沙門明佺等撰大乘重譯經目卷之三一百八十部四百二十一卷順權方便經一部二卷四十三紙長房本云權力方便經一名惟權方便經一名順權女經一名樂瓔珞莊嚴方便經一名轉女身菩薩所問受決經右吳孫亮代赤烏年沙門康僧會譯出長房録順權方便經一部二卷一名轉女身菩薩經又名順權女經三十三紙右西晉武帝代竺法護譯見內典録隨權女經一部二卷右西晉代沙門竺法護譯出長房録樂瓔珞莊嚴經一卷右秦羅什譯出長房録樂瓔珞莊嚴方便經一卷一名大乘瓔珞莊嚴經一名轉女身經三十紙右宋代沙門釋法海譯出長房録上五經同本別譯菩薩瓔珞經一部十二卷或十四卷一名現前報經右東晉代沙門耆多蜜譯出長房録菩薩瓔珞經一部十六卷或十四卷或十二卷三百三十七紙右前秦竺佛念於長安譯出內典録菩薩瓔珞本業經一部二卷四十二紙右前秦竺佛念於長安譯出內典録菩薩瓔珞本業經一部二卷右宋文帝元嘉四年沙門釋智嚴譯出長房録瓔珞本業經一部二卷一名菩薩瓔珞經三十七紙右宋文帝沙門道嚴譯出長房録上五經同本別譯觀佛三昧經一卷右後秦鳩摩羅什於長安逍遙園譯出長房録觀佛三昧經一部十卷或八卷一名觀佛三昧海經一百八十四紙右宋永初年沙門求那跋陀羅於楊州譯出內典録前二經同本異譯阿閦佛國經一部二卷一名阿閦經一名阿閦莂諸菩薩學戒品經第一譯四十七紙右後漢建和年支讖於洛陽譯出長房録阿閦佛國經一部二卷第二出一云阿閦佛剎諸菩薩學戒品經與支讖譯少異右東晉成帝支道根譯出長房録已上二經同本別譯如來莊嚴智慧光明入一切佛境界經一卷或二卷一名度諸佛經四十紙右後魏宣武代曇摩留支於洛陽譯見長房録度諸佛境界智光嚴經一卷一名如來莊嚴智慧光明入一切佛境界經一卷右後魏永平二年至天平年沙門菩提留支於洛及鄴譯出長房録度諸佛境界智嚴經一卷又加一切字十五紙右梁天監年曼陀羅仙共僧伽婆羅於楊都壽光殿及正觀寺占雲館三處譯出長房録上三經同本別譯念佛三昧經一部六卷或五卷一名菩薩念佛三昧經一百十三紙右宋大明六年沙門功德直於楊都譯見內典録大方等大集菩薩念佛三昧經一部十卷一百三十二紙右隋大業年笈多於東都上林園翻經館譯出內典録前二部十六卷同本別譯大薩遮尼乾子經一部七卷或八卷或十卷一百六十三紙右後魏正光元年菩提留支於洛都汝南王宅譯見長房録菩薩行方便境界神通變化經一部三卷右宋文帝元嘉年求那跋陀羅譯出長房録上二部十卷同本別譯持人菩薩所問經一部四卷或三卷六十一紙右西晉沙門竺法護於長安譯見內典録持人菩薩經一部三卷右前秦建元年涼州沙門竺佛念譯見長房録持世經一部四卷亦名法印經八十九紙右後秦弘始年沙門羅什於常安逍遙園譯見長房録善臂菩薩所問經一卷二十九紙右達摩鬱多羅録云後秦沙門羅什譯與持人菩薩所問經同本異譯善肩品抄經一卷出善臂菩薩經右出真寂寺録右前五經同本別譯文殊師利現寶藏經一部三卷或二卷亦云文殊師利佛土嚴淨經四十九紙右西晉太始年沙門竺法護譯出長房録文殊師利現寶藏經一部二卷四十九紙右西晉惠帝永興元年沙門支法度譯出長房録真寂寺録云與大方廣寶篋經同本異譯文殊師利現寶藏經一部二卷或名示現寶藏經或三卷右西晉惠帝太安年安息國沙門安法欽於洛陽譯見長房録上三經同本別譯慧上菩薩問大善權經一部二卷或一卷右後漢靈帝代臨淮清信士嚴佛調於洛陽譯見長房録慧上菩薩問大善權經一部二卷一名大善權經一名慧上菩薩經或云善權方便經初出或云方便所度無極經三十紙右西晉太康六年沙門竺法護譯見長房録大乘方便經一部三卷或二卷四十七紙第三出與法護僧伽陀譯小異與慧上菩薩所問經同本別譯右東晉元熙二年天竺居士竺難提於洛陽譯出長房録上慧菩薩經一部二卷又名善權經又名上慧菩薩問善權經又名大乘方便經一名大善權經右北涼沙門僧伽陀於涼州譯見始興録前四經同本別譯弘道廣顯三昧經一部四卷亦云阿耨達請佛經一名金剛門定意經或無三昧字六十三紙右凡四名有十品一本但七品少中三品一本只有前五品西晉永嘉二年竺法護於長安譯長房録如前又寶唱録六名一名阿耨達經一名阿耨達龍王經一名佛道廣顯經餘同上初出阿耨達龍王經一部二卷五十三紙右西晉竺法護於長安譯見內典録已上二部六卷同本異譯普超三昧經一部三卷或四卷第二出與漢支讖阿闍世王經同本異譯亦云文殊普超三昧經亦云普超經八十紙右西晉太康年竺法護於長安譯出內典録阿闍世王經一部二卷初出六十四紙右後漢支讖於洛陽譯出長房録更出阿闍世王經二卷第二出右西晉代竺法護譯出長房録放鉢經一卷是普超經別品殊譯出僧祐録八紙心本淨經一卷抄普超三昧經右道安云晉代法護出見僧祐録三幼童經一卷右西晉河內沙門白法祖譯出長房録溥首童真經一卷右西晉惠帝太康年聶道真譯出長房録往古造行經一卷右西晉惠帝法炬法立譯出長房録舉鉢經一卷右西晉惠帝沙門法炬法立譯出長房録無吾我經一卷右東晉孝武帝竺曇無蘭楊州謝鎮西寺譯出長房録已上十二經同出普超三昧經大灌頂經一部十二卷或九卷或五卷一百一十二紙右東晉元帝帛尸利蜜多於楊州譯出內典録三歸五戒帶佩護身呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂七萬二千神王護比丘呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂十二萬神王護比丘尼呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂百結神王護身呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂宮宅神王守鎮左右呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂冢墓因緣四方神呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂伏魔封印大神呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂摩尼羅亶大神呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂召五方龍王攝疫毒神呪經一卷右道安云晉代竺法護譯出見僧祐録灌頂梵天神呪策經一卷右道安云晉代竺法護譯出見僧祐録灌頂普廣經一卷一本名普廣菩薩經或名灌頂隨願往生十方淨土經右道安云晉代竺法護譯出見僧祐録隨願往生經一卷一名普廣經右吳黃武年支謙譯出達摩鬱多羅録灌頂經一部九卷右東晉元帝世白尸利蜜多譯長房録云出雜録大將軍神呪經一卷右東晉孝武帝竺曇無蘭楊都謝鎮西寺譯出長房録龍王結願五龍神呪經一卷右東晉孝武帝竺曇無蘭楊都謝鎮西寺譯出長房録五龍呪經一卷出真寂寺録右十七經出上大灌頂經等集衆德三昧經一部二卷或三卷或云集一切福德三昧經五十七紙右晉竺法護譯出長房録等集三昧經一卷右西晉惠帝河內沙門帛法祖譯出長房録集一切福德三昧經一部三卷出等集三昧經五十八紙右秦弘始年羅什於長安譯見真寂寺録上三經同本異譯伅真陀羅尼所問經一部二卷或三卷亦名屯真陀羅尼經初出五十七紙右後漢建寧年支讖於雒陽譯出長房録及內典録大樹緊那羅王所問經一部四卷第二出七十八紙右後秦弘始年羅什於常安譯見長房録已上二經同本別譯法鏡經一部二卷或一卷二十六紙右後漢靈帝代優婆塞安玄共嚴佛調於洛陽譯出長房録法鏡經一卷或二卷二十六紙右吳黃武年優婆塞支謙譯出長房録已上二經同本別譯郁伽羅越問菩薩行經一卷或二卷第三出或云郁伽長者經與魏世康僧鎧吳世支謙譯同本廣略小異三十紙右西晉武帝竺法護譯出長房録郁伽長者所問經一卷或二卷第二譯三十紙右前魏齊王代嘉平年康僧鎧於洛陽白馬寺譯出長房録郁伽長者經一部二卷或一卷第二出右吳黃武年支謙譯出長房録小郁伽經一卷與郁伽長者不同右西晉竺法護譯出長房録郁伽羅越問菩薩經一卷右西晉惠帝代白法祖譯出長房録郁伽長者所問經一卷右宋文帝代元嘉年罽賓三藏曇摩蜜多漢言法秀於祇洹寺譯出長房録已上六經同本別譯月明童子經一卷或云月明童男經或云月明菩薩三昧經七紙右吳赤烏年支謙譯出真寂寺録月光童子經一卷與申日經申日兜經失利越經三經同本異譯一名月明童子經十紙右西晉沙門竺法護譯見長房録申日兒本經一卷右宋文帝代求那跋陀羅於祇洹寺譯出長房録德護長者經一部二卷一名尸利崛多長者經與申日兜本經月光童子經同本異譯二十六紙右隋開皇年沙門那連提耶舍於長安譯見內典録失利越經一卷出僧祐録已上五經同本別譯十法經一卷右後魏佛陀扇多於洛及鄴譯出長房録十法經一卷二十紙右梁普通年僧伽婆羅於楊都譯出長房録已前二經同本別譯內藏百寶經一卷亦名內藏百品經八紙右後漢元嘉二年安世高於洛陽譯出長房録內藏百寶經一卷十紙右後漢靈帝世支讖譯出長房録已上二經同本別譯演道俗業經一卷一云無業字右吳支謙譯出長房録演道俗業經一卷第二出與吳代支謙譯者少異十紙右西秦沙門聖堅於河南國譯或云法堅或云堅公並是出長房録已上二經同本別譯寶網經一卷一名寶網童子經三十二紙右西晉竺法護譯出長房録寶網經一卷右秦羅什譯出長房録已上二經同本別譯文殊問菩提經一卷一名菩提經一名伽耶山頂經一名菩提無行經八紙右後秦弘始年羅什於常安譯出長房録伽耶山頂經一卷第二譯十一紙右後魏菩提留支於洛及鄴譯出長房録象頭精舍經一卷第三出九紙右隋開皇二年毗尼多留支於興善寺譯出長房録菩提無行經一卷七紙大乘伽耶山頂經一卷十紙右大周長壽二年菩提留志於大周東寺譯新編入録已上五經同本別譯聞成十二因緣經一卷四紙右後漢桓帝建初年安息國王子安世高譯出長房録聞成十二因緣經一卷第二譯右漢靈帝代沙門支曜於洛陽譯出長房録貝多樹下思惟十二因緣經一卷第二譯右吳黃武年支謙譯出長房録貝多樹下思惟十二因緣經一卷五紙右西晉竺法護譯出內典録十二因緣經一卷第四譯四紙右南齊永明年求那毗地於楊州譯出長房録已上五經同本別譯無量門微密持經一卷八紙右吳黃武年支謙譯出長房録阿難目佉經一卷與微密持經同右西晉惠帝三藏安法欽於洛陽譯出長房録無量破魔陀羅尼經一卷十二紙右西晉惠帝代河內沙門白法祖譯出長房録新微密持經一卷第二出一名成道降魔得一切智經右東晉安帝隆安二年佛陀跋陀羅於廬山譯出長房録出生無量門持經一卷八紙右東晉元熙年佛陀跋陀羅於廬山及楊州譯出長房録阿難目佉尼訶離陀羅尼經一卷十二紙一名無量微密持經一名跋陀羅無量門持經一名功德直破魔陀羅尼經右元魏代佛陀扇多於洛陽白馬寺譯出長房録無量門破魔陀羅尼經一卷十二紙右宋大明年功德直於荊州譯出內典録阿難陀目佉尼呵離陀經一卷右宋文帝代求那跋陀羅譯出長房録出無量持門經一卷右宋文帝代求那跋陀羅宋言功德賢元嘉十二年於楊都祇洹寺譯出長房録舍利弗陀羅尼經一卷九紙右梁代扶南沙門僧伽婆羅於楊都壽光殿譯出長房録一向出生菩薩經一卷